<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>DepthBoost</title>
<style>
:root {
    --neon:   #00ffcc;
    --red:    #ff0033;
    --amber:  #ffaa00;
    --panel:  #0a0c0f;
    --dark:   #060608;
    --border: rgba(0,255,204,0.14);
    --text:   rgba(0,255,204,0.85);
    --sub:    rgba(0,255,204,0.45);
}

- { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }

html, body {
background:var(–dark); height:100dvh; width:100vw; overflow:hidden;
font-family:‘SF Mono’,‘Fira Code’,‘Courier New’,monospace;
}
body {
display:flex; justify-content:center; align-items:stretch;
position:relative; overscroll-behavior:none; touch-action:pan-x pan-y;
}

/* ── Sky ── */
#sky { position:fixed; inset:0; width:100vw; height:100dvh; pointer-events:none; z-index:0; }

/* ── App shell ── */
.app {
position:relative; z-index:1; width:100%; max-width:420px;
background:var(–panel); display:flex; flex-direction:column;
box-shadow:0 0 80px rgba(0,0,0,0.9), 0 0 1px var(–border);
color:var(–text); -webkit-text-fill-color:var(–text);
}

/* ── Header ── */
header {
padding:12px 14px 10px; background:#070709;
border-bottom:1px solid var(–border);
display:flex; align-items:center; justify-content:space-between; flex-shrink:0;
}
.logo {
font-size:10px; letter-spacing:6px; font-weight:700; text-transform:uppercase;
color:var(–neon); -webkit-text-fill-color:var(–neon);
}
.logo span { color:rgba(0,255,204,0.38); -webkit-text-fill-color:rgba(0,255,204,0.38); }

.pill {
font-size:8px; letter-spacing:2px; padding:4px 10px;
border:1px solid var(–border); border-radius:20px;
color:var(–sub); -webkit-text-fill-color:var(–sub);
text-transform:uppercase; transition:all 0.3s; white-space:nowrap;
}
.pill.live  { border-color:var(–neon); color:var(–neon); -webkit-text-fill-color:var(–neon); box-shadow:0 0 12px rgba(0,255,204,0.3); }
.pill.err   { border-color:var(–red);   color:var(–red);   -webkit-text-fill-color:var(–red); }
.pill.warn  { border-color:var(–amber); color:var(–amber); -webkit-text-fill-color:var(–amber); }

/* ── Bluetooth bar ── */
#bt-bar {
background:#06080b; border-bottom:1px solid var(–border);
padding:6px 12px; display:none; align-items:center; gap:8px; flex-shrink:0;
}
#bt-bar.show { display:flex; }
.bt-lbl {
font-size:7px; letter-spacing:2px; color:var(–sub); -webkit-text-fill-color:var(–sub);
text-transform:uppercase; opacity:0.65; flex-shrink:0;
}
#bt-select {
flex:1; background:#0c0f12; border:1px solid rgba(0,255,204,0.2);
color:var(–neon); -webkit-text-fill-color:var(–neon);
font-family:inherit; font-size:8px; letter-spacing:0.5px;
padding:5px 8px; border-radius:5px; outline:none;
-webkit-appearance:none; appearance:none; cursor:pointer; text-transform:uppercase;
}
#bt-select option { background:#0c0f12; color:#00ffcc; }
#bt-refresh {
background:transparent; border:1px solid rgba(0,255,204,0.18);
color:var(–neon); -webkit-text-fill-color:var(–neon);
font-family:inherit; font-size:9px; padding:5px 10px; border-radius:5px;
cursor:pointer; flex-shrink:0; outline:none; -webkit-appearance:none;
font-weight:700; transition:opacity 0.15s;
}
#bt-refresh:active { opacity:0.5; }
.spin { animation:spin 0.5s linear infinite; }

/* ── Visualiser ── */
.viz-wrap {
flex:1; min-height:0; display:flex; flex-direction:column;
align-items:center; justify-content:center; padding:8px;
background:var(–panel); position:relative;
}
.viz-lbl {
font-size:7px; letter-spacing:5px; color:var(–sub);
-webkit-text-fill-color:var(–sub); text-transform:uppercase;
margin-bottom:8px; opacity:0.65;
}
.sphere-wrap { position:relative; display:flex; align-items:center; justify-content:center; }
.ring-o {
position:absolute; border-radius:50%;
border:1px solid rgba(0,255,204,0.09);
box-shadow:0 0 40px rgba(0,255,204,0.05),inset 0 0 40px rgba(0,255,204,0.02);
pointer-events:none; top:-16px; left:-16px; right:-16px; bottom:-16px;
}
.ring-i {
position:absolute; border-radius:50%;
border:1px solid rgba(0,255,204,0.26);
box-shadow:0 0 20px rgba(0,255,204,0.14),inset 0 0 20px rgba(0,255,204,0.04);
pointer-events:none; top:-5px; left:-5px; right:-5px; bottom:-5px;
}
#vc { display:block; border-radius:50%; touch-action:none; user-select:none; -webkit-user-select:none; }

/* ── Level meter ── */
.lvl-wrap { width:100%; max-width:280px; margin-top:12px; display:flex; align-items:center; gap:8px; }
.lvl-lbl  { font-size:7px; letter-spacing:2px; color:var(–sub); -webkit-text-fill-color:var(–sub); min-width:24px; opacity:0.55; }
.lvl-bar  { flex:1; height:4px; background:rgba(0,255,204,0.07); border-radius:2px; overflow:hidden; border:1px solid rgba(0,255,204,0.1); }
#lvl-fill { height:100%; width:0%; border-radius:2px; background:var(–neon); box-shadow:0 0 6px var(–neon); transition:width 0.06s ease-out, background 0.2s; }
#lvl-db   { font-size:8px; letter-spacing:1px; min-width:42px; text-align:right; color:var(–neon); -webkit-text-fill-color:var(–neon); opacity:0.55; }

/* ── Controls panel ── */
.ctrl { background:#080a0d; border-top:1px solid var(–border); padding:12px 16px 16px; flex-shrink:0; }

#status {
font-size:9px; letter-spacing:3px; color:var(–neon); -webkit-text-fill-color:var(–neon);
text-align:center; text-transform:uppercase; margin-bottom:12px; opacity:0.75; min-height:14px;
}

/* ── Knob row ── */
.knob-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:14px; }
.knob-cell { display:flex; flex-direction:column; align-items:center; gap:6px; }
.knob-title {
font-size:8px; letter-spacing:2.5px; color:var(–neon); -webkit-text-fill-color:var(–neon);
text-transform:uppercase; text-align:center; font-weight:700; line-height:1.4;
}
.knob-sub {
font-size:7px; letter-spacing:1px; color:var(–sub); -webkit-text-fill-color:var(–sub);
text-align:center; opacity:0.65;
}
.knob-outer {
position:relative; width:82px; height:82px;
cursor:pointer; touch-action:none; user-select:none; -webkit-user-select:none;
}
.knob-svg { width:100%; height:100%; }
.knob-val {
font-size:11px; font-weight:700; text-align:center; margin-top:2px;
color:var(–neon); -webkit-text-fill-color:var(–neon);
}

/* ── Buttons ── */
.btn-row { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:8px; }
.btn {
-webkit-appearance:none; appearance:none; outline:none;
background:transparent; border:1px solid rgba(0,255,204,0.28);
color:var(–neon); -webkit-text-fill-color:var(–neon);
font-family:inherit; font-size:9px; letter-spacing:2px; font-weight:700;
text-transform:uppercase; padding:11px 4px; border-radius:6px;
cursor:pointer; transition:all 0.15s; touch-action:manipulation;
}
.btn:active { transform:scale(0.93); opacity:0.6; }
.btn.go     { border-color:var(–neon); background:rgba(0,255,204,0.06); box-shadow:0 0 18px rgba(0,255,204,0.1); }
.btn.go.on  { background:var(–neon); color:#000; -webkit-text-fill-color:#000; box-shadow:0 0 24px rgba(0,255,204,0.5); }

/* ── Confirm button ── */
#btn-confirm {
display:none; width:100%; margin-bottom:8px;
border-color:var(–amber); color:var(–amber); -webkit-text-fill-color:var(–amber);
box-shadow:0 0 14px rgba(255,170,0,0.2);
}
#btn-confirm.show { display:block; animation:blink 1s ease-in-out infinite; }

/* ── Source chip ── */
.chip {
text-align:center; font-size:8px; letter-spacing:1.5px;
color:var(–sub); -webkit-text-fill-color:var(–sub);
opacity:0.55; text-transform:uppercase; min-height:12px; transition:all 0.3s;
}
.chip.warn { color:var(–amber); -webkit-text-fill-color:var(–amber); opacity:1; animation:blink 1.4s ease-in-out infinite; }
.chip.ok   { color:var(–neon);  -webkit-text-fill-color:var(–neon);  opacity:0.8; animation:none; }

/* ── Landscape ── */
@media (orientation:landscape) and (max-height:500px){
.app { flex-direction:row; max-width:100vw; }
header { padding:8px 12px; }
.logo  { font-size:8px; letter-spacing:4px; }
#bt-bar{ padding:4px 10px; }
.viz-wrap { width:42vw; flex-shrink:0; border-right:1px solid var(–border); }
.ctrl { flex:1; overflow-y:auto; padding:8px 12px 10px; border-top:none; }
#status { margin-bottom:6px; font-size:7px; }
.knob-row { gap:8px; margin-bottom:8px; }
.knob-outer { width:60px; height:60px; }
.knob-title { font-size:7px; }
.knob-val   { font-size:9px; }
.btn { padding:9px 4px; font-size:8px; }
.lvl-wrap { max-width:100%; margin-top:8px; }
}

/* ── Animations ── */
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.28} }
@keyframes spin   { to{transform:rotate(360deg)} }
</style>

</head>

<script>
"use strict";

// ═══════════════════════════════════════════════════════
//  CANVAS SETUP
// ═══════════════════════════════════════════════════════
const vc = document.getElementById('vc');
const cx = vc.getContext('2d');
let SZ, CX, CY, R;

function sizeCanvas(){
    const land = window.innerWidth > window.innerHeight && window.innerHeight < 500;
    let sz;
    if(land){
        const col = Math.round(window.innerWidth * 0.42);
        sz = Math.min(col, window.innerHeight - 60) - 30;
    } else {
        const avail = window.innerHeight - 355;
        sz = Math.min(Math.round(window.innerWidth * 0.58), avail, 210);
    }
    SZ = Math.max(sz, 90);
    vc.width = vc.height = SZ;
    vc.style.width = vc.style.height = SZ + 'px';
    CX = CY = SZ / 2;
    R  = SZ * 0.455;
}
sizeCanvas();
let _rt;
window.addEventListener('resize', ()=>{ clearTimeout(_rt); _rt=setTimeout(()=>{ sizeCanvas(); rebuildStars(); },150); });
window.addEventListener('orientationchange', ()=>{ setTimeout(()=>{ sizeCanvas(); rebuildStars(); },300); });

// ═══════════════════════════════════════════════════════
//  GEODESIC SPHERE GEOMETRY
// ═══════════════════════════════════════════════════════
const GN=[], GE=[];
(function(){
    const LD=10, LO=20;
    for(let li=0;li<=LD;li++){
        const frac=li/LD, lat=-Math.PI/2+Math.PI*frac;
        const type=frac<0.33?'lo':frac>0.66?'hi':'mid';
        const fi=type==='lo'?Math.floor(Math.random()*5):type==='hi'?19+Math.floor(Math.random()*37):5+Math.floor(Math.random()*14);
        const cnt=Math.max(1,Math.round(LO*Math.cos(lat)));
        for(let lj=0;lj<cnt;lj++) GN.push({lat,lon:2*Math.PI*lj/cnt+(li%2?.18:0),type,fi});
    }
    for(let a=0;a<GN.length;a++) for(let b=a+1;b<GN.length;b++){
        const na=GN[a],nb=GN[b];
        let dl=Math.abs(na.lon-nb.lon); if(dl>Math.PI)dl=2*Math.PI-dl;
        if(Math.sqrt((na.lat-nb.lat)**2+(dl*Math.cos((na.lat+nb.lat)/2))**2)<0.40) GE.push([a,b]);
    }
})();

function proj(lat,lon,rY){
    const cl=Math.cos(lat),sl=Math.sin(lat),co=Math.cos(lon+rY),so=Math.sin(lon+rY);
    return{x:CX+cl*so*R, y:CY-sl*R, z:cl*co};
}

// ── Orbital stars ──
const BANDS=[...Array(18).fill('lo'),...Array(16).fill('mid'),...Array(18).fill('hi')];
let STARS=[];
function makeStars(){
    return BANDS.map(band=>{
        const oR=0.13+Math.random()*0.68, dir=Math.random()<0.3?-1:1;
        const spd=dir*(0.055+Math.random()*0.20)/Math.sqrt(oR);
        const iB=band==='lo'?(Math.random()-0.5)*0.55:band==='hi'?Math.PI*.5+(Math.random()-0.5)*.7:(Math.random()-0.5)*Math.PI;
        const fi=band==='lo'?Math.floor(Math.random()*5):band==='hi'?19+Math.floor(Math.random()*35):5+Math.floor(Math.random()*14);
        const ecc=Math.random()*0.42;
        return{band,fi,hue:band,oR,spd,iB,
            aN0:Math.random()*Math.PI*2, pR:(Math.random()-.5)*.012,
            wA:.02+Math.random()*.08, wS:.008+Math.random()*.025,
            wP:Math.random()*Math.PI*2, ecc, ph:Math.random()*Math.PI*2,
            sz:.10+Math.random()*.48*(1-oR*.3), bOp:.20+Math.random()*.50,
            tSpd:.5+Math.random()*2.5, tAmp:.08+Math.random()*.28,
            tPh:Math.random()*Math.PI*2, tLen:3+Math.floor(Math.random()*5),
            tDt:.18+Math.random()*.25};
    });
}
STARS=makeStars();
function rebuildStars(){ STARS=makeStars(); }

function starPos(s,t,off){
    const te=t-(off||0), asc=s.aN0+s.pR*te;
    const inc=s.iB+s.wA*Math.sin(s.wS*te+s.wP);
    const M=s.ph+s.spd*te, E=M+s.ecc*Math.sin(M);
    const trA=2*Math.atan2(Math.sqrt(1+s.ecc)*Math.sin(E/2), Math.sqrt(1-s.ecc)*Math.cos(E/2));
    const r=Math.min(s.oR*R*(1-s.ecc*s.ecc)/(1+s.ecc*Math.cos(trA)), R*0.87);
    const xO=r*Math.cos(trA), yO=r*Math.sin(trA);
    const cI=Math.cos(inc),sI=Math.sin(inc),cN=Math.cos(asc),sN=Math.sin(asc);
    return{sx:CX+cN*xO-sN*yO*cI, sy:CY-(sN*xO+cN*yO*cI), depth:(yO*sI)/R};
}

// ═══════════════════════════════════════════════════════
//  SKY STARFIELD BACKGROUND
// ═══════════════════════════════════════════════════════
(function(){
    const sky=document.getElementById('sky'), sc=sky.getContext('2d');
    let sw,sh,SS=[];
    const COLS=[[190,240,255],[210,255,248],[200,220,255],[180,210,255],[155,235,255]];
    function mkS(){
        SS=[];
        const n=Math.round(sw*sh/1800);
        for(let i=0;i<n;i++){
            const col=COLS[Math.random()<0.6?0:Math.floor(Math.random()*COLS.length)];
            const sz=Math.random()<0.92?.25+Math.random()*.6:.8+Math.random()*1;
            SS.push({x:Math.random()*sw,y:Math.random()*sh,sz,col,
                ba:.35+Math.random()*.55,ts:.4+Math.random()*2.2,
                ta:.06+Math.random()*.28,tp:Math.random()*Math.PI*2,
                dx:(Math.random()-.5)*.012,dy:(Math.random()-.5)*.006});
        }
    }
    function rsz(){ sw=sky.width=window.innerWidth; sh=sky.height=window.innerHeight; mkS(); }
    rsz(); window.addEventListener('resize',rsz);
    (function loop(){
        requestAnimationFrame(loop);
        const t=Date.now()/1000;
        const g=sc.createLinearGradient(0,0,0,sh);
        g.addColorStop(0,'#07080c'); g.addColorStop(.5,'#060608'); g.addColorStop(1,'#040406');
        sc.fillStyle=g; sc.fillRect(0,0,sw,sh);
        [[sw*.15,sh*.2,sw*.28],[sw*.78,sh*.6,sw*.22],[sw*.5,sh*.85,sw*.18]].forEach(([nx,ny,nr])=>{
            const ng=sc.createRadialGradient(nx,ny,0,nx,ny,nr);
            ng.addColorStop(0,'rgba(0,50,42,0.07)'); ng.addColorStop(1,'rgba(0,0,0,0)');
            sc.fillStyle=ng; sc.fillRect(0,0,sw,sh);
        });
        SS.forEach(s=>{
            s.x=(s.x+s.dx+sw)%sw; s.y=(s.y+s.dy+sh)%sh;
            const tw=1+s.ta*Math.sin(t*s.ts+s.tp), al=Math.min(1,s.ba*tw);
            const[r,g2,b]=s.col;
            if(s.sz>.7){
                const h=sc.createRadialGradient(s.x,s.y,0,s.x,s.y,s.sz*3.5);
                h.addColorStop(0,`rgba(${r},${g2},${b},${al*.3})`); h.addColorStop(1,'rgba(0,0,0,0)');
                sc.beginPath(); sc.arc(s.x,s.y,s.sz*3.5,0,Math.PI*2); sc.fillStyle=h; sc.fill();
            }
            sc.beginPath(); sc.arc(s.x,s.y,Math.max(.2,s.sz),0,Math.PI*2);
            sc.fillStyle=`rgba(${r},${g2},${b},${al})`; sc.fill();
        });
    })();
})();

// ═══════════════════════════════════════════════════════
//  AUDIO ENGINE STATE
// ═══════════════════════════════════════════════════════
let actx=null, analyser=null, srcNode=null, stream=null;

// VOLUME/CLARITY path ─ BBE 882i (series) + FBQ1000 (series) ║ DBX AFS-2 (parallel)
let bbeHi, bbePresence, bbeWave;       // BBE 882i Hi-Definition stage
let fbqN1, fbqN2, fbqN3;              // FBQ1000 protective notches
let afsN1, afsN2, afsN3;             // DBX AFS-2 parallel (afsN3 = adaptive)
let seriesGain, parallelGain;

// LO CONTOUR path ─ BBE 882i Lo Contour + AFS-2 lo feedback killer
let loShelf, afsLo1, afsLo2, afsLo3; // loShelf = BBE Lo, afsLo3 = adaptive
let loGain;

// Output ─ sum → limiter (−0.1 dBFS) → master → gate → analyser → dest
let sumNode, limiter, masterGain, gateGain;

// Gate state
let gateEnv=0, gateOpen=false;

// Timers
let afsMidTimer=null, afsLoTimer=null, gateTimer=null;

// Flags
let isLive=false, isBypassed=false, isMicInput=false, hpConfirmed=false;

// Current output sink id
let sinkId='default';

// ═══════════════════════════════════════════════════════
//  BLUETOOTH / OUTPUT DEVICE MANAGEMENT
// ═══════════════════════════════════════════════════════
const btBar     = document.getElementById('bt-bar');
const btSelect  = document.getElementById('bt-select');
const btRefresh = document.getElementById('bt-refresh');

async function loadOutputDevices(){
    try {
        const devices = await navigator.mediaDevices.enumerateDevices();
        const outs    = devices.filter(d => d.kind === 'audiooutput');
        if(!outs.length){ btBar.classList.remove('show'); return; }

        btSelect.innerHTML = '';
        outs.forEach(d => {
            const opt = document.createElement('option');
            opt.value = d.deviceId;
            let lbl = d.label || (d.deviceId === 'default' ? 'System Default' : 'Audio Output');
            // Detect Bluetooth devices by label keywords
            const isBT = /bluetooth|airpod|buds|bose|sony|jabra|beats|jbl|wireless|headset|earphone|sennheiser|plantronics|poly|anker/i.test(lbl);
            const isHP = /headphone|headset|earphone|airpod|buds/i.test(lbl);
            if(d.deviceId === 'default') opt.textContent = '\uD83D\uDD0A ' + lbl;
            else if(isBT || isHP)        opt.textContent = '\uD83C\uDFA7 ' + lbl.slice(0,36);
            else                         opt.textContent = '\uD83D\uDD0A ' + lbl.slice(0,36);
            opt.selected = (d.deviceId === sinkId);
            btSelect.appendChild(opt);
        });
        btBar.classList.add('show');
    } catch(e){ console.warn('enumerateDevices:', e); }
}

btSelect.addEventListener('change', async ()=>{
    sinkId = btSelect.value;
    if(!actx) return;
    if(typeof actx.setSinkId === 'function'){
        try {
            await actx.setSinkId(sinkId);
            const lbl = (btSelect.selectedOptions[0]?.text || '').replace(/^[\uD83C-\uDBFF\uDC00-\uDFFF]\s*/,'').slice(0,24).toUpperCase();
            setStatus('OUTPUT \u2192 ' + lbl);
        } catch(e){ setStatus('SWITCH FAILED \u2014 USE SYSTEM AUDIO'); }
    } else {
        setStatus('RESTART CAPTURE TO SWITCH DEVICE');
    }
});

btRefresh.addEventListener('click', ()=>{
    btRefresh.classList.add('spin');
    loadOutputDevices().then(()=>{ setTimeout(()=>btRefresh.classList.remove('spin'), 500); });
});

// Initial load + watch for device changes
loadOutputDevices();
try { navigator.mediaDevices.addEventListener('devicechange', loadOutputDevices); } catch(e){}

// ═══════════════════════════════════════════════════════
//  AUDIO GRAPH CONSTRUCTION
// ═══════════════════════════════════════════════════════
function buildGraph(src){
    actx = new (window.AudioContext || window.webkitAudioContext)({
        sampleRate: 44100, latencyHint: 'playback'
    });
    analyser = actx.createAnalyser();
    analyser.fftSize = 2048;
    analyser.smoothingTimeConstant = 0.82;

    srcNode = actx.createMediaStreamSource(src);

    // ── BBE 882i — Hi-Definition series stage ─────────────────────────────────
    // High shelf: Definition (air + top-end presence)
    bbeHi = actx.createBiquadFilter();
    bbeHi.type = 'highshelf'; bbeHi.frequency.value = 3200; bbeHi.gain.value = 0;

    // Peaking presence: BBE harmonic recovery (~5.2kHz)
    bbePresence = actx.createBiquadFilter();
    bbePresence.type = 'peaking'; bbePresence.frequency.value = 5200;
    bbePresence.Q.value = 0.85; bbePresence.gain.value = 0;

    // Waveshaper: BBE harmonic exciter — soft odd-harmonic saturation
    // Increases perceived loudness without raising peak level (psychoacoustic trick)
    bbeWave = actx.createWaveShaper();
    bbeWave.oversample = '4x';
    setWaveshaper(0);

    // ── FBQ1000 — protective notch filters (series, after BBE) ────────────────
    // Deepen as boost rises — prevents resonance buildup at high gain
    fbqN1 = actx.createBiquadFilter(); fbqN1.type='notch'; fbqN1.frequency.value=400;  fbqN1.Q.value=10;
    fbqN2 = actx.createBiquadFilter(); fbqN2.type='notch'; fbqN2.frequency.value=800;  fbqN2.Q.value=10;
    fbqN3 = actx.createBiquadFilter(); fbqN3.type='notch'; fbqN3.frequency.value=2500; fbqN3.Q.value=10;

    seriesGain = actx.createGain(); seriesGain.gain.value = 0.5;

    // ── DBX AFS-2 — feedback suppression (parallel, taps source directly) ─────
    // 2 fixed notches + 1 adaptive (tracks loudest 200Hz–7kHz peak every 500ms)
    afsN1 = actx.createBiquadFilter(); afsN1.type='notch'; afsN1.frequency.value=630;  afsN1.Q.value=14;
    afsN2 = actx.createBiquadFilter(); afsN2.type='notch'; afsN2.frequency.value=1250; afsN2.Q.value=14;
    afsN3 = actx.createBiquadFilter(); afsN3.type='notch'; afsN3.frequency.value=3150; afsN3.Q.value=14;

    parallelGain = actx.createGain(); parallelGain.gain.value = 0.5;

    // ── BBE 882i — Lo Contour stage (independent path) ────────────────────────
    // Phase-corrected bass shelf — frequency is device-adaptive
    loShelf = actx.createBiquadFilter();
    loShelf.type = 'lowshelf'; loShelf.frequency.value = getContourFreq(); loShelf.gain.value = 0;

    // ── AFS-2 Lo — low-frequency feedback killer ──────────────────────────────
    // 2 fixed low-freq notches + 1 adaptive (tracks 60Hz–400Hz)
    afsLo1 = actx.createBiquadFilter(); afsLo1.type='notch'; afsLo1.frequency.value=100; afsLo1.Q.value=8;
    afsLo2 = actx.createBiquadFilter(); afsLo2.type='notch'; afsLo2.frequency.value=200; afsLo2.Q.value=8;
    afsLo3 = actx.createBiquadFilter(); afsLo3.type='notch'; afsLo3.frequency.value=160; afsLo3.Q.value=8;

    loGain = actx.createGain(); loGain.gain.value = 0;

    // ── Sum → Limiter (−0.1 dBFS hard ceiling) → Master ──────────────────────
    sumNode = actx.createGain(); sumNode.gain.value = 1.0;

    limiter = actx.createDynamicsCompressor();
    limiter.threshold.value = -0.1;   // −0.1 dBFS hard ceiling
    limiter.knee.value      =  0.0;   // no soft knee — hard brick wall
    limiter.ratio.value     = 20.0;   // 20:1 ≈ brick wall
    limiter.attack.value    =  0.001; // 1ms — catches transients immediately
    limiter.release.value   =  0.05;  // 50ms release

    masterGain = actx.createGain(); masterGain.gain.value = 1.0;

    // ── Gate — starts MUTED on mic input, opened by confirmHeadphones() ───────
    gateGain = actx.createGain(); gateGain.gain.value = 0;

    // ════════════════════════════════════════════════════════════════
    //  SIGNAL ROUTING
    //
    //  src ─┬─ [SERIES]   bbeHi→bbePresence→bbeWave
    //       │              →fbqN1→fbqN2→fbqN3→seriesGain(×0.5) ──┐
    //       │                                                      │
    //       ├─ [PARALLEL]  afsN1→afsN2→afsN3→parallelGain(×0.5) ─┤→ sum
    //       │                                                      │
    //       └─ [LO PATH]   loShelf→afsLo1→afsLo2→afsLo3→loGain ─┘
    //
    //  sum → limiter(−0.1dBFS) → masterGain → gateGain → analyser → dest
    // ════════════════════════════════════════════════════════════════

    // Series branch (BBE → FBQ)
    srcNode.connect(bbeHi);
    bbeHi.connect(bbePresence); bbePresence.connect(bbeWave);
    bbeWave.connect(fbqN1); fbqN1.connect(fbqN2); fbqN2.connect(fbqN3);
    fbqN3.connect(seriesGain); seriesGain.connect(sumNode);

    // Parallel branch (AFS-2 taps source directly — not from BBE output)
    srcNode.connect(afsN1);
    afsN1.connect(afsN2); afsN2.connect(afsN3);
    afsN3.connect(parallelGain); parallelGain.connect(sumNode);

    // Lo Contour branch (BBE Lo + AFS-2 lo feedback killer)
    srcNode.connect(loShelf);
    loShelf.connect(afsLo1); afsLo1.connect(afsLo2); afsLo2.connect(afsLo3);
    afsLo3.connect(loGain); loGain.connect(sumNode);

    // Output chain
    sumNode.connect(limiter); limiter.connect(masterGain);
    masterGain.connect(gateGain); gateGain.connect(analyser);
    analyser.connect(actx.destination);

    // Apply chosen Bluetooth/output device if supported
    if(typeof actx.setSinkId === 'function' && sinkId && sinkId !== 'default'){
        actx.setSinkId(sinkId).catch(()=>{});
    }

    // Start adaptive AFS trackers
    startAFS_Mid();
    startAFS_Lo();

    // Apply current knob values
    applyBoost(getKnobVal('boost'));
    applyBass(getKnobVal('bass'));
}

// ── BBE harmonic exciter waveshaper ──────────────────────────────────────────
// Odd-harmonic soft clipping — same psychoacoustic principle as original 882i
// drive=0 → linear passthrough, drive=1 → warm saturated harmonic addition
function setWaveshaper(drive){
    const n=512, curve=new Float32Array(n);
    for(let i=0;i<n;i++){
        const x=(i*2/n)-1, k=drive*10;
        curve[i] = k===0 ? x : (3*x - x*x*x*(k/3)) / (2 + k*x*x*0.5);
    }
    bbeWave.curve = curve;
}

// ── VOLUME/CLARITY: BBE 882i (series) + FBQ1000 (series) ║ AFS-2 (parallel) ─
// One knob controls: BBE shelves + waveshaper drive + FBQ notch depth + gain
// 0 → +20 dB total — genuinely noticeable across all playback systems
function applyBoost(v){
    if(!actx) return;
    const dB  = v * 20;
    const lin = Math.pow(10, dB/20);

    // BBE 882i Hi-Definition stage
    bbeHi.gain.value       = v * 10;   // 0 → +10 dB high shelf
    bbePresence.gain.value = v * 8;    // 0 → +8 dB presence peak
    setWaveshaper(v * 0.72);           // harmonic exciter scales with boost

    // FBQ1000: notches deepen as gain rises → prevents resonance/feedback buildup
    const nd = -(v * 4.5);
    fbqN1.gain.value = nd; fbqN2.gain.value = nd; fbqN3.gain.value = nd;

    // Gain match: series×0.5 + parallel×0.5 = full lin gain
    // Both paths summed at equal weight so total = target gain
    seriesGain.gain.value   = lin * 0.5;
    parallelGain.gain.value = lin * 0.5;
}

// ── LO CONTOUR: BBE 882i Lo Contour + AFS-2 lo feedback killer ───────────────
// Independent knob — set once per speaker system
// 0 → +14 dB at device-adaptive frequency (120–200Hz)
function applyBass(v){
    if(!actx) return;
    loShelf.gain.value = v * 14;    // BBE Lo Contour shelf
    const nd = -(v * 5);
    afsLo1.gain.value = nd;         // AFS-2 fixed low notches deepen with bass
    afsLo2.gain.value = nd;
    loGain.gain.value = v;          // lo path gain (0→1 linearly)
}

// ── Full bypass — flatten all enhancement nodes ───────────────────────────────
function applyBypass(on){
    if(!actx) return;
    if(on){
        bbeHi.gain.value=0; bbePresence.gain.value=0; setWaveshaper(0);
        fbqN1.gain.value=0; fbqN2.gain.value=0; fbqN3.gain.value=0;
        seriesGain.gain.value=0.5; parallelGain.gain.value=0.5;
        loShelf.gain.value=0;
        afsLo1.gain.value=0; afsLo2.gain.value=0;
        loGain.gain.value=0;
    } else {
        applyBoost(getKnobVal('boost'));
        applyBass(getKnobVal('bass'));
        if(hpConfirmed && gateGain && actx)
            gateGain.gain.setTargetAtTime(1.0, actx.currentTime, 0.05);
    }
}

// ── Adaptive AFS-2 mid/high tracker (200Hz–7kHz) ─────────────────────────────
// Hunts the loudest peak in the mid-high range and moves afsN3 there
// Smooth exponential tracking (72/28 mix) prevents audible glitches
function startAFS_Mid(){
    if(afsMidTimer) clearInterval(afsMidTimer);
    afsMidTimer = setInterval(()=>{
        if(!analyser || !isLive) return;
        const bins=analyser.frequencyBinCount, fd=new Float32Array(bins);
        analyser.getFloatFrequencyData(fd);
        const sr=actx.sampleRate;
        const lo=Math.floor(200/(sr/2)*bins), hi=Math.ceil(7000/(sr/2)*bins);
        let pBin=lo, pVal=-Infinity;
        for(let i=lo;i<hi;i++) if(fd[i]>pVal){ pVal=fd[i]; pBin=i; }
        if(pVal > -22){
            const hz=(pBin/bins)*(sr/2);
            afsN3.frequency.value = afsN3.frequency.value*0.72 + hz*0.28;
        }
    }, 500);
}

// ── Adaptive AFS-2 lo tracker (60Hz–400Hz) ───────────────────────────────────
// Same technique for low-frequency resonance — moves afsLo3
function startAFS_Lo(){
    if(afsLoTimer) clearInterval(afsLoTimer);
    afsLoTimer = setInterval(()=>{
        if(!analyser || !isLive) return;
        const bins=analyser.frequencyBinCount, fd=new Float32Array(bins);
        analyser.getFloatFrequencyData(fd);
        const sr=actx.sampleRate;
        const lo=Math.floor(60/(sr/2)*bins), hi=Math.ceil(400/(sr/2)*bins);
        let pBin=lo, pVal=-Infinity;
        for(let i=lo;i<hi;i++) if(fd[i]>pVal){ pVal=fd[i]; pBin=i; }
        if(pVal > -28){
            const hz=(pBin/bins)*(sr/2);
            afsLo3.frequency.value = afsLo3.frequency.value*0.75 + hz*0.25;
        }
    }, 700);
}

// ── Device-adaptive Lo Contour frequency ─────────────────────────────────────
// Small phone speakers: 200Hz (upper bass warmth)
// Tablet/mid phone:    165Hz
// Desktop/headphones:  120Hz (real sub presence)
function getContourFreq(){
    const w=Math.min(window.screen.width, window.screen.height);
    return w<400 ? 200 : w<768 ? 165 : 120;
}

// ═══════════════════════════════════════════════════════
//  HEADPHONE CONFIRMATION + NOISE GATE
// ═══════════════════════════════════════════════════════
// When using mic input, output is MUTED by default.
// User must physically plug in headphones then tap CONFIRM.
// This eliminates the speaker → mic → speaker feedback loop entirely.
// After confirmation, a noise gate (20ms poll) closes output during silence
// to prevent any residual pickup during quiet passages.

function confirmHeadphones(){
    if(!actx || !gateGain) return;
    hpConfirmed = true;
    gateGain.gain.setTargetAtTime(1.0, actx.currentTime, 0.05);
    document.getElementById('btn-confirm').classList.remove('show');
    chip.textContent = '\u2713 HEADPHONES ACTIVE \u00B7 PROCESSING';
    chip.className = 'chip ok';
    setStatus('ENHANCING \u00B7 ACTIVE');
    setPill('LIVE', 'live');
    startNoiseGate();
}

function startNoiseGate(){
    if(gateTimer) clearInterval(gateTimer);
    gateTimer = setInterval(()=>{
        if(!analyser || !isLive || !hpConfirmed) return;
        const fd=new Uint8Array(analyser.frequencyBinCount);
        analyser.getByteFrequencyData(fd);
        const sr=actx.sampleRate, bins=fd.length;
        const loB=Math.floor(300/(sr/2)*bins);
        let sum=0, cnt=0;
        for(let i=loB;i<bins;i++){ sum+=fd[i]*fd[i]; cnt++; }
        const rms=Math.sqrt(sum/cnt)/255;
        // Asymmetric smoothing: fast attack, slow release
        gateEnv = rms > gateEnv ? gateEnv*0.85+rms*0.15 : gateEnv*0.95+rms*0.05;
        const wantOpen = gateEnv > 0.04;
        if(wantOpen !== gateOpen){
            gateOpen = wantOpen;
            gateGain.gain.setTargetAtTime(
                gateOpen ? 1.0 : 0.0,
                actx.currentTime,
                gateOpen ? 0.008 : 0.035  // fast open, slower close
            );
        }
    }, 20);
}

// ═══════════════════════════════════════════════════════
//  CAPTURE LIFECYCLE
// ═══════════════════════════════════════════════════════
const btnCapture = document.getElementById('btn-capture');
const btnBypass  = document.getElementById('btn-bypass');
const pillEl     = document.getElementById('pill');
const statusEl   = document.getElementById('status');
const chip       = document.getElementById('chip');

function setStatus(msg){ statusEl.textContent = msg; }
function setPill(txt, cls){ pillEl.className='pill '+(cls||''); pillEl.textContent=txt; }

async function startCapture(){
    if(isLive){ stopCapture(); return; }
    setStatus('REQUESTING AUDIO\u2026');
    try {
        let src;
        isMicInput = false;

        if(navigator.mediaDevices.getDisplayMedia){
            try {
                // Primary: system / tab audio via getDisplayMedia
                // Works on desktop Chrome/Edge and Android Chrome
                src = await navigator.mediaDevices.getDisplayMedia({
                    video: false,
                    audio: {
                        echoCancellation: false,
                        noiseSuppression: false,
                        autoGainControl:  false,
                        sampleRate: 44100,
                    }
                });
                chip.textContent = 'SOURCE: SYSTEM / TAB AUDIO';
                chip.className = 'chip ok';
            } catch(e){
                if(e.name==='NotAllowedError' || e.name==='AbortError'){
                    setStatus('CAPTURE DENIED'); setPill('DENIED','err'); return;
                }
                // Fallback: microphone (iOS Safari, unsupported browsers)
                src = await getMic();
                if(!src) return;
                isMicInput = true;
            }
        } else {
            src = await getMic();
            if(!src) return;
            isMicInput = true;
        }

        stream = src;
        buildGraph(src);

        // Re-enumerate devices now that we have permission — BT labels appear
        loadOutputDevices();

        isLive = true;
        btnCapture.textContent = '\u25A0 STOP';
        btnCapture.classList.add('on');

        if(isMicInput){
            // OUTPUT STAYS MUTED — gate.gain = 0 until confirmHeadphones()
            hpConfirmed = false;
            chip.textContent = '\u26A0 PLUG IN HEADPHONES THEN TAP CONFIRM';
            chip.className = 'chip warn';
            setPill('MUTED','warn');
            setStatus('PLUG IN HEADPHONES \u00B7 TAP CONFIRM');
            document.getElementById('btn-confirm').classList.add('show');
        } else {
            // System audio: no feedback risk — open gate immediately
            hpConfirmed = true;
            gateGain.gain.setTargetAtTime(1.0, actx.currentTime, 0.05);
            setPill('LIVE','live');
            setStatus('ENHANCING \u00B7 ACTIVE');
        }

        // Handle external track end (e.g. user stops screen share in browser UI)
        stream.getTracks().forEach(t => t.addEventListener('ended', ()=>{ if(isLive) stopCapture(); }));

    } catch(e){
        console.error(e);
        setStatus('CANNOT ACCESS AUDIO');
        setPill('ERROR','err');
        chip.textContent = 'CHECK BROWSER PERMISSIONS'; chip.className='chip warn';
    }
}

async function getMic(){
    try {
        return await navigator.mediaDevices.getUserMedia({
            audio:{
                echoCancellation: true,   // ESSENTIAL: prevents mic→speaker loop
                noiseSuppression: true,
                autoGainControl:  false,
                sampleRate: 44100,
            }
        });
    } catch(e){
        setStatus('MIC ACCESS DENIED'); setPill('ERROR','err');
        chip.textContent='ALLOW MICROPHONE PERMISSION'; chip.className='chip warn';
        return null;
    }
}

function stopCapture(){
    if(stream){ stream.getTracks().forEach(t=>t.stop()); stream=null; }
    if(afsMidTimer){ clearInterval(afsMidTimer); afsMidTimer=null; }
    if(afsLoTimer) { clearInterval(afsLoTimer);  afsLoTimer=null;  }
    if(gateTimer)  { clearInterval(gateTimer);   gateTimer=null;   }
    if(actx)       { actx.close();               actx=null;        }
    analyser=null; srcNode=null;
    isLive=false; isBypassed=false; isMicInput=false; hpConfirmed=false;
    gateEnv=0; gateOpen=false;
    document.getElementById('btn-confirm').classList.remove('show');
    btnCapture.textContent='\u25BA CAPTURE'; btnCapture.classList.remove('on');
    btnBypass.textContent='\u2298 BYPASS'; btnBypass.classList.remove('on');
    setPill('STANDBY','');
    setStatus('TAP CAPTURE TO BEGIN');
    chip.textContent='NO SOURCE CONNECTED'; chip.className='chip';
    document.getElementById('lvl-fill').style.width='0%';
    document.getElementById('lvl-db').textContent='\u2014 dB';
}

btnCapture.addEventListener('click', startCapture);

btnBypass.addEventListener('click',()=>{
    if(!isLive){ setStatus('CAPTURE AUDIO FIRST'); return; }
    isBypassed = !isBypassed;
    applyBypass(isBypassed);
    btnBypass.classList.toggle('on', isBypassed);
    btnBypass.textContent = isBypassed ? '\u25BA ENHANCE' : '\u2298 BYPASS';
    setPill(isBypassed?'BYPASS':'LIVE', isBypassed?'err':'live');
    setStatus(isBypassed ? 'BYPASSED \u00B7 PASSTHROUGH' : 'ENHANCING \u00B7 ACTIVE');
});

// ═══════════════════════════════════════════════════════
//  ROTARY KNOBS
//  Geometry: 0% = 9-o'clock (left), 100% = 3-o'clock (right)
//  Gap at bottom. 180° sweep. dashoffset=-100.53 starts arc at 9-o'clock.
// ═══════════════════════════════════════════════════════
const KMIN=-90, KSWP=180;       // degree limits
const CIRC=201.06, HALFC=100.53; // 2π×32, half

function getKnobVal(id){ return parseInt(document.getElementById('knob-'+id).dataset.val)/100; }

function updateKnobUI(id, pct){
    const frac = pct/100;
    const deg  = KMIN + frac*KSWP;  // -90 → +90°

    // Rotate tick
    document.getElementById('ktick-'+id).style.transform = `rotate(${deg}deg)`;

    // Grow arc from 9-o'clock
    const arcLen = frac * HALFC;
    const arc    = document.getElementById('karc-'+id);
    arc.setAttribute('stroke-dasharray', `${arcLen} ${CIRC}`);

    // Colour: teal → yellow-green → amber
    const hue = 165 - frac*60;
    const col = `hsl(${hue},100%,55%)`;
    arc.setAttribute('stroke', col);
    arc.style.filter = `drop-shadow(0 0 5px ${col})`;
    document.getElementById('ktick-'+id).setAttribute('stroke', col);

    // Value label
    const boostdB = (frac*20).toFixed(1);
    document.getElementById('kval-'+id).textContent =
        id==='boost' ? (pct===0 ? '0 dB' : '+'+boostdB+' dB') : pct+'%';

    if(!isBypassed){
        if(id==='boost') applyBoost(frac);
        if(id==='bass')  applyBass(frac);
    }
}

function bindKnob(id){
    const el = document.getElementById('knob-'+id);
    let startY, startVal, dragging=false;

    const onStart = e => {
        dragging=true;
        startY = e.touches ? e.touches[0].clientY : e.clientY;
        startVal = parseInt(el.dataset.val);
        e.preventDefault();
    };
    const onMove = e => {
        if(!dragging) return;
        const y   = e.touches ? e.touches[0].clientY : e.clientY;
        const d   = Math.round((startY-y)*0.65); // drag UP = increase
        const nv  = Math.min(100, Math.max(0, startVal+d));
        el.dataset.val = nv;
        updateKnobUI(id, nv);
        e.preventDefault();
    };
    const onEnd = () => { dragging=false; };

    el.addEventListener('touchstart', onStart, {passive:false});
    el.addEventListener('touchmove',  onMove,  {passive:false});
    el.addEventListener('touchend',   onEnd);
    el.addEventListener('mousedown',  onStart);
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup',   onEnd);

    // Scroll wheel (desktop)
    el.addEventListener('wheel', e=>{
        const v=parseInt(el.dataset.val), n=Math.min(100,Math.max(0,v+(e.deltaY<0?2:-2)));
        el.dataset.val=n; updateKnobUI(id,n); e.preventDefault();
    }, {passive:false});
}

bindKnob('boost'); bindKnob('bass');
updateKnobUI('boost', 55);
updateKnobUI('bass',  35);

// ═══════════════════════════════════════════════════════
//  DRAW LOOP — sphere + level meter
// ═══════════════════════════════════════════════════════
let rmsSmooth=0;

function draw(){
    requestAnimationFrame(draw);
    const bins = analyser ? analyser.frequencyBinCount : 64;
    const freq = new Uint8Array(bins);
    if(analyser) analyser.getByteFrequencyData(freq);

    const bV = getKnobVal('boost'), bassV = getKnobVal('bass');

    // ── Level meter ──────────────────────────────────────────────────────────
    if(analyser && isLive){
        let s=0; for(let i=0;i<bins;i++) s+=(freq[i]/255)**2;
        const rms=Math.sqrt(s/bins);
        rmsSmooth=rmsSmooth*0.88+rms*0.12;
        const db=20*Math.log10(Math.max(rmsSmooth,1e-6));
        const pct=Math.min(100,Math.max(0,(db+60)/60*100));
        const hue=165-pct*0.55;
        const fill=document.getElementById('lvl-fill');
        fill.style.width=pct+'%';
        fill.style.background=`hsl(${hue},100%,55%)`;
        fill.style.boxShadow=`0 0 6px hsl(${hue},100%,55%)`;
        document.getElementById('lvl-db').textContent=db>-60?db.toFixed(1)+' dB':'\u2014 dB';
    }

    // ── Sphere ───────────────────────────────────────────────────────────────
    cx.clearRect(0,0,SZ,SZ);
    const bg=cx.createRadialGradient(CX,CY*.85,0,CX,CY,R*1.05);
    bg.addColorStop(0,'rgba(4,28,22,1)'); bg.addColorStop(.5,'rgba(2,14,12,1)'); bg.addColorStop(1,'rgba(0,4,8,1)');
    cx.beginPath(); cx.arc(CX,CY,R,0,Math.PI*2); cx.fillStyle=bg; cx.fill();
    cx.save(); cx.beginPath(); cx.arc(CX,CY,R-.5,0,Math.PI*2); cx.clip();

    const t=Date.now()/1000;

    // Orbital stars
    STARS.forEach(s=>{
        const rawF=freq[Math.min(s.fi,bins-1)]/255;
        const boost=s.band==='lo'?bassV*.6:s.band==='hi'?bV*.6:bV*.4;
        const energy=Math.min(1,rawF+boost);
        let cr,cg,cb;
        if(s.hue==='lo'){cr=0;cg=210;cb=140;}else if(s.hue==='hi'){cr=170;cg=235;cb=255;}else{cr=0;cg=255;cb=215;}
        const bl=energy*.68;
        const r=Math.round(cr+(255-cr)*bl),g=Math.round(cg+(255-cg)*bl*.45),b=Math.round(cb+(255-cb)*bl*.25);
        for(let st=s.tLen;st>=1;st--){
            const gh=starPos(s,t,st*s.tDt); if(gh.depth<-.05) continue;
            const gd=.28+.72*((gh.depth+1)/2), fd=1-st/(s.tLen+1);
            cx.beginPath(); cx.arc(gh.sx,gh.sy,Math.max(.1,s.sz*.55*fd*gd),0,Math.PI*2);
            cx.fillStyle=`rgba(${cr},${cg},${cb},${fd*.18*gd*(.4+energy*.5)})`; cx.fill();
        }
        const pos=starPos(s,t); if(pos.depth<-.08) return;
        const da=.28+.72*((pos.depth+1)/2), ds=.50+.50*((pos.depth+1)/2);
        const tw=1+(s.tAmp+energy*.22)*Math.sin(t*s.tSpd+s.tPh);
        const al=Math.min(1,(s.bOp+energy*.45)*da*tw);
        const rad=(s.sz+energy*1.1)*ds, hR=Math.max(rad*2.5,rad*2.5+energy*4.5);
        if(al>.08){
            const gw=cx.createRadialGradient(pos.sx,pos.sy,0,pos.sx,pos.sy,hR);
            gw.addColorStop(0,`rgba(${r},${g},${b},${al*(.28+energy*.38)})`);
            gw.addColorStop(.5,`rgba(${cr},${cg},${cb},${al*.05})`);
            gw.addColorStop(1,'rgba(0,0,0,0)');
            cx.beginPath(); cx.arc(pos.sx,pos.sy,hR,0,Math.PI*2); cx.fillStyle=gw; cx.fill();
        }
        cx.beginPath(); cx.arc(pos.sx,pos.sy,Math.max(.18,rad),0,Math.PI*2);
        cx.fillStyle=`rgba(${r},${g},${b},${Math.min(1,al)})`; cx.fill();
    });

    // Geodesic edges
    const rotY=(Date.now()/1000)*.16, P=GN.map(n=>proj(n.lat,n.lon,rotY));
    GE.map(([a,b])=>({a,b,pa:P[a],pb:P[b],mZ:(P[a].z+P[b].z)/2}))
      .sort((x,y)=>x.mZ-y.mZ)
      .forEach(({a,b,pa,pb,mZ})=>{
        if(pa.z<0&&pb.z<0) return;
        const vis=Math.min(1,Math.max(0,mZ+.18)*3.5); if(vis<=0) return;
        const na=GN[a],nb=GN[b];
        const e=(freq[Math.min(na.fi,bins-1)]+freq[Math.min(nb.fi,bins-1)])/(2*255);
        const[r,g,b2]=na.type==='lo'?[0,200,155]:na.type==='hi'?[160,245,255]:[0,255,215];
        cx.beginPath(); cx.moveTo(pa.x,pa.y); cx.lineTo(pb.x,pb.y);
        cx.strokeStyle=`rgba(${r},${g},${b2},${Math.min(.55,(.04+e*.38)*vis)})`;
        cx.lineWidth=.4+e*.85; cx.stroke();
    });

    // Geodesic nodes
    GN.forEach((n,i)=>{
        const p=P[i]; if(p.z<-.12) return;
        const rV=freq[Math.min(n.fi,bins-1)]/255;
        const boost=n.type==='lo'?bassV*.55:n.type==='hi'?bV*.55:bV*.35;
        const energy=Math.min(1,rV+boost), vis=Math.max(0,p.z+.18);
        const dotR=Math.max(.3,(.8+energy*3.8)*vis);
        const[cr,cg,cb]=n.type==='lo'?[0,210,140]:n.type==='hi'?[170,240,255]:[0,255,210];
        if(energy>.06){
            const gw=cx.createRadialGradient(p.x,p.y,0,p.x,p.y,dotR*5);
            gw.addColorStop(0,`rgba(${cr},${cg},${cb},${energy*.55*vis})`);
            gw.addColorStop(.4,`rgba(${cr},${cg},${cb},${energy*.12*vis})`);
            gw.addColorStop(1,'rgba(0,0,0,0)');
            cx.beginPath(); cx.arc(p.x,p.y,dotR*5,0,Math.PI*2); cx.fillStyle=gw; cx.fill();
        }
        const wm=energy*.85;
        cx.beginPath(); cx.arc(p.x,p.y,dotR,0,Math.PI*2);
        cx.fillStyle=`rgba(${Math.round(cr+(255-cr)*wm)},${Math.round(cg+(255-cg)*wm*.4)},${Math.round(cb+(255-cb)*wm*.25)},${Math.min(1,.45+energy*.75)*vis})`;
        cx.fill();
    });

    cx.restore();

    // Specular rim
    const sp=cx.createRadialGradient(CX-R*.38,CY-R*.38,0,CX,CY,R);
    sp.addColorStop(0,'rgba(0,255,200,.08)'); sp.addColorStop(.55,'rgba(0,255,200,.01)'); sp.addColorStop(1,'rgba(0,0,0,0)');
    cx.beginPath(); cx.arc(CX,CY,R,0,Math.PI*2); cx.fillStyle=sp; cx.fill();
    cx.beginPath(); cx.arc(CX,CY,R,0,Math.PI*2); cx.strokeStyle='rgba(0,255,204,.32)'; cx.lineWidth=1.8; cx.stroke();
}
draw();

// ── Prevent scroll/jank on canvas and knobs ───────────────────────────────────
vc.addEventListener('touchmove', e=>e.preventDefault(), {passive:false});
vc.addEventListener('touchstart',e=>e.preventDefault(), {passive:false});
document.addEventListener('touchmove', e=>{
    if(e.target.closest('.knob-outer, #bt-select')) return;
    e.preventDefault();
}, {passive:false});
</script>
