.panel {

}

}

.slider-thumb {
width: 12px;
height: 12px;

position: absolute;
top: 50%;
transform: translate(-50%, -50%);
cursor: grab;
box-shadow: 0 0 10px rgba(0,255,200,0.8);
transition: left 0.05s;
}

input[type=range].out-range {
-webkit-appearance: none;
flex: 1;
height: 4px;

width: 100%;

.knob-group {

.knob-label {

/* Buttons */

.footer-item::before { content: ‘✓’; color: #00ffcc; }

<script>
// ─── SPHERE ANIMATION ───────────────────────────────────────────
const canvas = document.getElementById('sphereCanvas');
const ctx = canvas.getContext('2d');
const W = 220, H = 220, CX = W/2, CY = H/2, R = 90;

const nodes = [];
for (let i = 0; i < 38; i++) {
  const theta = Math.random() * Math.PI * 2;
  const phi   = Math.acos(2 * Math.random() - 1);
  nodes.push({
    theta, phi,
    speed: (Math.random() - 0.5) * 0.003,
    bright: Math.random(),
    size: Math.random() * 2.5 + 0.5
  });
}

let rot = 0;
function project(theta, phi) {
  const x = Math.sin(phi) * Math.cos(theta + rot);
  const y = Math.cos(phi);
  const z = Math.sin(phi) * Math.sin(theta + rot);
  const px = CX + x * R;
  const py = CY - y * R;
  const depth = (z + 1) / 2;
  return { px, py, depth };
}

function drawSphere() {
  ctx.clearRect(0, 0, W, H);

  // Outer glow ring
  const grad = ctx.createRadialGradient(CX,CY,R-4,CX,CY,R+4);
  grad.addColorStop(0, 'rgba(0,255,180,0.15)');
  grad.addColorStop(1, 'transparent');
  ctx.beginPath();
  ctx.arc(CX, CY, R, 0, Math.PI*2);
  ctx.strokeStyle = 'rgba(0,220,160,0.4)';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // Grid lines
  for (let lat = -60; lat <= 60; lat += 30) {
    const phi = (90 - lat) * Math.PI / 180;
    ctx.beginPath();
    let first = true;
    for (let lon = 0; lon <= 360; lon += 5) {
      const theta = lon * Math.PI / 180;
      const {px, py, depth} = project(theta, phi);
      if (depth < 0.3) { first = true; continue; }
      first ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
      first = false;
    }
    ctx.strokeStyle = `rgba(0,160,120,${0.08 + depth * 0.08})`;
    ctx.lineWidth = 0.5;
    ctx.stroke();
  }
  for (let lon = 0; lon < 360; lon += 45) {
    const theta0 = lon * Math.PI / 180;
    ctx.beginPath();
    let first = true;
    for (let lat2 = -90; lat2 <= 90; lat2 += 5) {
      const phi2 = (90 - lat2) * Math.PI / 180;
      const {px, py, depth} = project(theta0, phi2);
      if (depth < 0.25) { first = true; continue; }
      first ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
      first = false;
    }
    ctx.strokeStyle = `rgba(0,160,120,0.08)`;
    ctx.lineWidth = 0.5;
    ctx.stroke();
  }

  // Connections
  const projected = nodes.map(n => ({ ...project(n.theta, n.phi), bright: n.bright }));
  for (let i = 0; i < nodes.length; i++) {
    for (let j = i+1; j < nodes.length; j++) {
      const a = projected[i], b = projected[j];
      const dx = a.px - b.px, dy = a.py - b.py;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < 55 && a.depth > 0.35 && b.depth > 0.35) {
        const alpha = (1 - dist/55) * 0.3 * a.depth;
        ctx.beginPath();
        ctx.moveTo(a.px, a.py);
        ctx.lineTo(b.px, b.py);
        ctx.strokeStyle = `rgba(0,220,160,${alpha})`;
        ctx.lineWidth = 0.8;
        ctx.stroke();
      }
    }
  }

  // Nodes
  nodes.forEach((n, i) => {
    n.theta += n.speed;
    const {px, py, depth} = projected[i];
    if (depth < 0.25) return;
    const glow = n.bright * depth;
    const r2 = n.size * depth;
    const g = ctx.createRadialGradient(px,py,0,px,py,r2*4);
    g.addColorStop(0, `rgba(200,255,240,${glow * 0.9})`);
    g.addColorStop(0.4, `rgba(0,255,180,${glow * 0.5})`);
    g.addColorStop(1, 'transparent');
    ctx.beginPath();
    ctx.arc(px, py, r2*4, 0, Math.PI*2);
    ctx.fillStyle = g;
    ctx.fill();
    ctx.beginPath();
    ctx.arc(px, py, r2, 0, Math.PI*2);
    ctx.fillStyle = `rgba(200,255,230,${0.7 * depth})`;
    ctx.fill();
  });

  rot += 0.003;
  requestAnimationFrame(drawSphere);
}
drawSphere();

// ─── OUTPUT SLIDER ───────────────────────────────────────────────
const outSlider = document.getElementById('outSlider');
const sliderFill = document.getElementById('sliderFill');
const sliderThumb = document.getElementById('sliderThumb');
const outDb = document.getElementById('outDb');

function updateSlider(val) {
  const min = -60, max = 0;
  const pct = ((val - min) / (max - min)) * 100;
  sliderFill.style.width = pct + '%';
  sliderThumb.style.left = pct + '%';
  const sign = val >= 0 ? '+' : '';
  outDb.textContent = sign + val.toFixed(1) + ' dB';
}

outSlider.addEventListener('input', () => {
  updateSlider(parseFloat(outSlider.value));
});

updateSlider(-12);

// ─── KNOBS ───────────────────────────────────────────────────────
// Arc math:
//  The knob travels 270° total (from -135° to +135° from top = 6 o'clock bottom gap)
//  circumference of r=28: 2π×28 ≈ 175.93
//  270° = 175.93 * (270/360) = 131.95  → active dasharray length
//  We offset by -22 so arc starts at bottom-left (-135° from top)

const CIRC = 2 * Math.PI * 28;           // 175.93
const ARC_TOTAL = CIRC * (270 / 360);    // 131.95  (the full sweep)

function valToArcLen(val, min, max) {
  const t = (val - min) / (max - min);   // 0..1
  return t * ARC_TOTAL;
}

function valToDeg(val, min, max) {
  const t = (val - min) / (max - min);
  return -135 + t * 270;                 // -135° .. +135°  (from top)
}

function setupKnob(knobId, arcId, lineId, valId, suffix) {
  const knob   = document.getElementById(knobId);
  const arcEl  = document.getElementById(arcId);
  const lineEl = document.getElementById(lineId);
  const valEl  = document.getElementById(valId);

  let value    = parseFloat(knob.dataset.value);
  const min    = parseFloat(knob.dataset.min);
  const max    = parseFloat(knob.dataset.max);
  let dragging = false;
  let startY   = 0;
  let startVal = value;

  function render(v) {
    const arcLen = valToArcLen(v, min, max);
    arcEl.setAttribute('stroke-dasharray', `${arcLen} ${CIRC}`);

    const deg = valToDeg(v, min, max);
    lineEl.setAttribute('transform', `rotate(${deg}, 40, 40)`);

    const sign = v >= 0 ? '+' : '';
    valEl.textContent = sign + v.toFixed(1) + ' dB';
  }

  render(value);

  knob.addEventListener('mousedown', e => {
    dragging = true;
    startY   = e.clientY;
    startVal = value;
    e.preventDefault();
  });
  knob.addEventListener('touchstart', e => {
    dragging = true;
    startY   = e.touches[0].clientY;
    startVal = value;
    e.preventDefault();
  }, { passive: false });

  window.addEventListener('mousemove', e => {
    if (!dragging) return;
    const dy = startY - e.clientY;          // drag up = increase
    const range = max - min;
    value = Math.max(min, Math.min(max, startVal + (dy / 120) * range));
    render(value);
  });
  window.addEventListener('touchmove', e => {
    if (!dragging) return;
    const dy = startY - e.touches[0].clientY;
    const range = max - min;
    value = Math.max(min, Math.min(max, startVal + (dy / 120) * range));
    render(value);
  }, { passive: false });

  window.addEventListener('mouseup',  () => { dragging = false; });
  window.addEventListener('touchend', () => { dragging = false; });

  knob.addEventListener('wheel', e => {
    e.preventDefault();
    const delta = -e.deltaY * 0.1;
    value = Math.max(min, Math.min(max, value + delta));
    render(value);
  }, { passive: false });
}

setupKnob('knobDepth', 'depthArc', 'depthLine', 'depthVal', ' dB');
setupKnob('knobBoost', 'boostArc', 'boostLine', 'boostVal', ' dB');
</script>
