<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>DepthBoost</title>
<style>
:root {
    --neon:   #00ffcc;
    --red:    #ff0033;
    --amber:  #ffaa00;
    --yellow: #00ffcc;
    --white:  #00ffcc;
    --panel:  #0a0c0f;
    --dark:   #060608;
    --border: rgba(0,255,204,0.14);
    --sub:    rgba(0,255,204,0.70);
}
* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
html,body {
    background:var(--dark); height:100dvh; width:100vw; overflow:hidden;
    font-family:'SF Mono','Fira Code','Courier New',monospace;
}
body {
    display:flex; justify-content:center; align-items:stretch;
    position:relative; overscroll-behavior:none; touch-action:pan-x pan-y;
}
#sky { position:fixed; inset:0; width:100vw; height:100dvh; pointer-events:none; z-index:0; }
.app {
    position:relative; z-index:1; width:100%; max-width:420px;
    background:var(--panel); display:flex; flex-direction:column;
    box-shadow:0 0 80px rgba(0,0,0,0.9), 0 0 1px var(--border);
    color:var(--neon); -webkit-text-fill-color:var(--neon);
}
header {
    padding:12px 14px 10px; background:#070709;
    border-bottom:1px solid var(--border);
    display:flex; align-items:center; justify-content:space-between; flex-shrink:0;
}
.logo {
    font-size:13px; letter-spacing:6px; font-weight:700; text-transform:uppercase;
    color:var(--neon); -webkit-text-fill-color:var(--neon);
}
.logo span { color:rgba(0,255,204,0.4); -webkit-text-fill-color:rgba(0,255,204,0.4); }
.pill {
    font-size:10px; letter-spacing:2px; padding:5px 12px;
    border:1px solid rgba(0,255,204,0.2); border-radius:20px;
    color:rgba(0,255,204,0.6); -webkit-text-fill-color:rgba(0,255,204,0.6);
    text-transform:uppercase; transition:all 0.3s; white-space:nowrap;
}
.pill.live { border-color:var(--neon);  color:var(--neon);  -webkit-text-fill-color:var(--neon);  box-shadow:0 0 12px rgba(0,255,204,0.3); }
.pill.err  { border-color:var(--red);   color:var(--red);   -webkit-text-fill-color:var(--red); }
.pill.warn { border-color:var(--amber); color:var(--amber); -webkit-text-fill-color:var(--amber); }
#bt-bar {
    background:#06080b; border-bottom:1px solid var(--border);
    padding:6px 12px; display:none; align-items:center; gap:8px; flex-shrink:0;
}
#bt-bar.show { display:flex; }
.bt-lbl {
    font-size:10px; letter-spacing:2px; color:var(--neon);
    -webkit-text-fill-color:var(--neon); text-transform:uppercase; opacity:0.8; flex-shrink:0;
}
#bt-select {
    flex:1; background:#0c0f12; border:1px solid rgba(0,255,204,0.2);
    color:var(--neon); -webkit-text-fill-color:var(--neon);
    font-family:inherit; font-size:9px; letter-spacing:0.5px;
    padding:6px 8px; border-radius:5px; outline:none;
    -webkit-appearance:none; appearance:none; cursor:pointer; text-transform:uppercase;
}
#bt-select option { background:#0c0f12; color:#00ffcc; }
#bt-refresh {
    background:transparent; border:1px solid rgba(0,255,204,0.18);
    color:var(--neon); -webkit-text-fill-color:var(--neon);
    font-size:11px; padding:6px 10px; border-radius:5px;
    cursor:pointer; flex-shrink:0; outline:none; -webkit-appearance:none;
    font-weight:700; transition:opacity 0.15s;
}
#bt-refresh:active { opacity:0.5; }
.viz-wrap {
    flex:1; min-height:0; display:flex; flex-direction:column;
    align-items:center; justify-content:center; padding:8px; background:var(--panel);
}
.viz-lbl {
    font-size:9px; letter-spacing:5px; color:rgba(0,255,204,0.6);
    -webkit-text-fill-color:rgba(0,255,204,0.6); text-transform:uppercase; margin-bottom:8px;
}
.sphere-wrap { position:relative; display:flex; align-items:center; justify-content:center; }
.ring-o {
    position:absolute; border-radius:50%;
    border:1px solid rgba(0,255,204,0.09);
    box-shadow:0 0 40px rgba(0,255,204,0.05),inset 0 0 40px rgba(0,255,204,0.02);
    pointer-events:none; top:-16px; left:-16px; right:-16px; bottom:-16px;
}
.ring-i {
    position:absolute; border-radius:50%;
    border:1px solid rgba(0,255,204,0.26);
    box-shadow:0 0 20px rgba(0,255,204,0.14),inset 0 0 20px rgba(0,255,204,0.04);
    pointer-events:none; top:-5px; left:-5px; right:-5px; bottom:-5px;
}
#vc { display:block; border-radius:50%; touch-action:none; user-select:none; -webkit-user-select:none; }
.lvl-wrap { width:100%; max-width:280px; margin-top:12px; display:flex; align-items:center; gap:8px; }
.lvl-lbl  { font-size:10px; letter-spacing:2px; color:var(--neon); -webkit-text-fill-color:var(--neon); min-width:28px; opacity:0.8; }
.lvl-bar  { flex:1; height:5px; background:rgba(0,255,204,0.07); border-radius:3px; overflow:hidden; border:1px solid rgba(0,255,204,0.1); }
#lvl-fill { height:100%; width:0%; border-radius:3px; background:var(--neon); box-shadow:0 0 6px var(--neon); transition:width 0.06s ease-out,background 0.2s; }
#lvl-db   { font-size:11px; letter-spacing:1px; min-width:46px; text-align:right; color:var(--neon); -webkit-text-fill-color:var(--neon); opacity:0.85; }
.ctrl { background:#080a0d; border-top:1px solid var(--border); padding:12px 16px 16px; flex-shrink:0; }
#status {
    font-size:12px; letter-spacing:3px; color:var(--neon); -webkit-text-fill-color:var(--neon);
    text-align:center; text-transform:uppercase; margin-bottom:13px; opacity:0.9; min-height:16px;
}
.knob-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:14px; }
.knob-cell { display:flex; flex-direction:column; align-items:center; gap:6px; }
.knob-title {
    font-size:11px; letter-spacing:2px; color:var(--neon);
    -webkit-text-fill-color:var(--neon); text-transform:uppercase;
    text-align:center; font-weight:700; line-height:1.4;
}
.knob-sub {
    font-size:10px; letter-spacing:1px; color:rgba(0,255,204,0.65);
    -webkit-text-fill-color:rgba(0,255,204,0.65); text-align:center;
}
.knob-outer {
    position:relative; width:82px; height:82px;
    cursor:pointer; touch-action:none; user-select:none; -webkit-user-select:none;
}
.knob-svg { width:100%; height:100%; }
.knob-val {
    font-size:14px; font-weight:700; text-align:center; margin-top:3px;
    color:var(--neon); -webkit-text-fill-color:var(--neon);
}
.btn-row { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:8px; }
.btn {
    -webkit-appearance:none; appearance:none; outline:none;
    background:transparent; border:1px solid rgba(0,255,204,0.28);
    color:var(--neon); -webkit-text-fill-color:var(--neon);
    font-family:inherit; font-size:12px; letter-spacing:2px; font-weight:700;
    text-transform:uppercase; padding:13px 6px; border-radius:7px;
    cursor:pointer; transition:all 0.15s; touch-action:manipulation; text-align:center;
}
.btn:active { transform:scale(0.93); opacity:0.6; }
.btn.go    { border-color:var(--neon); background:rgba(0,255,204,0.06); box-shadow:0 0 18px rgba(0,255,204,0.1); }
.btn.go.on { background:var(--neon); color:#000; -webkit-text-fill-color:#000; box-shadow:0 0 24px rgba(0,255,204,0.5); }
.btn.amber { border-color:var(--amber); color:var(--amber); -webkit-text-fill-color:var(--amber); box-shadow:0 0 14px rgba(255,170,0,0.2); }
#btn-confirm { display:none; width:100%; margin-bottom:8px; }
#btn-confirm.show { display:block; animation:blink 1s ease-in-out infinite; }
#ios-src { display:none; margin-bottom:8px; }
#ios-src.show { display:block; }
#ios-file-row { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:6px; }
.file-label {
    display:flex; align-items:center; justify-content:center; gap:5px;
    background:transparent; border:1px solid rgba(0,255,204,0.28);
    color:var(--neon); -webkit-text-fill-color:var(--neon);
    font-family:inherit; font-size:12px; letter-spacing:2px; font-weight:700;
    text-transform:uppercase; padding:13px 6px; border-radius:7px;
    cursor:pointer; touch-action:manipulation;
}
#ios-url-row { display:none; flex-wrap:wrap; gap:6px; align-items:center; margin-bottom:6px; }
#ios-url-row.open { display:flex; }
#ios-url-inp {
    flex:1; min-width:0; background:#0c0f12; border:1px solid rgba(0,255,204,0.2);
    color:var(--neon); -webkit-text-fill-color:var(--neon);
    font-family:inherit; font-size:10px; padding:9px 10px;
    border-radius:6px; outline:none; width:100%;
}
#ios-url-inp::placeholder { color:rgba(0,255,204,0.3); }
#ios-now-playing {
    font-size:10px; letter-spacing:1px; color:var(--neon); -webkit-text-fill-color:var(--neon);
    text-align:center; margin-top:4px; min-height:12px; opacity:0.8;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.chip {
    text-align:center; font-size:11px; letter-spacing:1.5px;
    color:rgba(0,255,204,0.65); -webkit-text-fill-color:rgba(0,255,204,0.65);
    text-transform:uppercase; min-height:14px; transition:all 0.3s;
}
.chip.warn { color:var(--amber); -webkit-text-fill-color:var(--amber); animation:blink 1.4s ease-in-out infinite; }
.chip.ok   { color:var(--neon);  -webkit-text-fill-color:var(--neon); animation:none; }

/* Mic mute indicator */
#mic-mute-indicator {
display:none; text-align:center; font-size:10px; letter-spacing:2px;
color:var(–amber); -webkit-text-fill-color:var(–amber);
text-transform:uppercase; margin-bottom:6px;
padding:5px; border:1px solid rgba(255,170,0,0.3); border-radius:5px;
animation:blink 1.4s ease-in-out infinite;
}
#mic-mute-indicator.show { display:block; }

@media (orientation:landscape) and (max-height:500px) {
.app { flex-direction:row; max-width:100vw; }
header { padding:8px 12px; }
.logo { font-size:10px; letter-spacing:4px; }
#bt-bar { padding:4px 10px; }
.viz-wrap { width:42vw; flex-shrink:0; border-right:1px solid var(–border); }
.ctrl { flex:1; overflow-y:auto; padding:8px 12px 10px; border-top:none; }
#status { margin-bottom:6px; font-size:10px; }
.knob-row { gap:8px; margin-bottom:8px; }
.knob-outer { width:60px; height:60px; }
.knob-title { font-size:9px; }
.knob-val   { font-size:11px; }
.btn { padding:10px 4px; font-size:10px; }
.lvl-wrap { max-width:100%; margin-top:8px; }
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.28} }
@keyframes spin   { to{transform:rotate(360deg)} }
.spin { animation:spin 0.5s linear infinite; display:inline-block; }
</style>

</head>
<body>
<canvas id="sky"></canvas>
<div class="app">
    <header>
        <div class="logo">DEPTH<span>BOOST</span></div>
        <div class="pill" id="pill">STANDBY</div>
    </header>
    <div id="bt-bar">
        <span class="bt-lbl">&#x1F4F6; OUT</span>
        <select id="bt-select"><option value="default">&#x1F50A; SYSTEM DEFAULT</option></select>
        <button id="bt-refresh">&#x21BA;</button>
    </div>
    <div class="viz-wrap">
        <div class="viz-lbl">IMMERSION SPHERE</div>
        <div class="sphere-wrap">
            <div class="ring-o"></div>
            <div class="ring-i"></div>
            <canvas id="vc"></canvas>
        </div>
        <div class="lvl-wrap">
            <span class="lvl-lbl">OUT</span>
            <div class="lvl-bar"><div id="lvl-fill"></div></div>
            <span id="lvl-db">&#x2014; dB</span>
        </div>
    </div>
    <div class="ctrl">
        <div id="status">TAP CAPTURE TO BEGIN</div>
        <div id="mic-mute-indicator">&#x1F3A7; VOICE MUTED &#x2014; MIC FEEDBACK SUPPRESSED</div>
        <div class="knob-row">
            <div class="knob-cell">
                <div class="knob-title">DEPTH</div>
                <div class="knob-outer" id="knob-boost" data-val="55">
                    <svg class="knob-svg" viewBox="0 0 82 82">
                        <!-- Track arc: 225deg start, 270deg sweep -->
                        <circle cx="41" cy="41" r="32" fill="none"
                            stroke="rgba(0,255,204,0.12)" stroke-width="4"
                            stroke-dasharray="150.80 201.06"
                            stroke-dashoffset="-25.13"
                            stroke-linecap="round"/>
                        <circle id="karc-boost" cx="41" cy="41" r="32" fill="none"
                            stroke="#00ffcc" stroke-width="4"
                            stroke-dasharray="0 201.06"
                            stroke-dashoffset="-25.13"
                            stroke-linecap="round"
                            style="filter:drop-shadow(0 0 5px #00ffcc)"/>
                        <circle cx="41" cy="41" r="24" fill="#0c0f13"
                            stroke="rgba(0,255,204,0.18)" stroke-width="1"/>
                        <line id="ktick-boost" x1="41" y1="20" x2="41" y2="27"
                            stroke="#00ffcc" stroke-width="2.5" stroke-linecap="round"
                            style="transform-origin:41px 41px; transform:rotate(-135deg)"/>
                    </svg>
                </div>
                <div class="knob-val" id="kval-boost">+11.0 dB</div>
            </div>
            <div class="knob-cell">
                <div class="knob-title">BOOST</div>
                <div class="knob-outer" id="knob-bass" data-val="35">
                    <svg class="knob-svg" viewBox="0 0 82 82">
                        <circle cx="41" cy="41" r="32" fill="none"
                            stroke="rgba(0,255,204,0.12)" stroke-width="4"
                            stroke-dasharray="150.80 201.06"
                            stroke-dashoffset="-25.13"
                            stroke-linecap="round"/>
                        <circle id="karc-bass" cx="41" cy="41" r="32" fill="none"
                            stroke="#00ffcc" stroke-width="4"
                            stroke-dasharray="0 201.06"
                            stroke-dashoffset="-25.13"
                            stroke-linecap="round"
                            style="filter:drop-shadow(0 0 5px #00ffcc)"/>
                        <circle cx="41" cy="41" r="24" fill="#0c0f13"
                            stroke="rgba(0,255,204,0.18)" stroke-width="1"/>
                        <line id="ktick-bass" x1="41" y1="20" x2="41" y2="27"
                            stroke="#00ffcc" stroke-width="2.5" stroke-linecap="round"
                            style="transform-origin:41px 41px; transform:rotate(-135deg)"/>
                    </svg>
                </div>
                <div class="knob-val" id="kval-bass">35%</div>
            </div>
        </div>
        <div class="btn-row" id="capture-row">
            <button class="btn go" id="btn-capture">&#x25BA; CAPTURE</button>
            <button class="btn"    id="btn-bypass">&#x2298; BYPASS</button>
        </div>
        <button class="btn amber" id="btn-confirm" onclick="confirmHeadphones()">
            &#x1F3A7; HEADPHONES IN &#x2014; TAP CONFIRM
        </button>
        <div id="ios-src">
            <div id="ios-file-row">
                <label class="file-label">
                    &#x1F4C1; LOAD FILE
                    <input type="file" id="ios-file" accept="audio/*,video/*" style="display:none">
                </label>
                <button class="btn" id="ios-url-btn">&#x1F517; URL</button>
            </div>
            <div id="ios-url-row">
                <input id="ios-url-inp" type="url" placeholder="https:// audio URL (mp3, m4a, aac…)">
                <button class="btn go" id="ios-url-load" style="white-space:nowrap; padding:9px 12px;">LOAD</button>
            </div>
            <div id="ios-now-playing"></div>
            <div style="margin-top:8px;">
                <button class="btn" id="ios-bypass" style="width:100%;">&#x2298; BYPASS</button>
            </div>
        </div>
        <audio id="ios-audio" crossorigin="anonymous"></audio>
        <div class="chip" id="chip">NO SOURCE CONNECTED</div>
    </div>
</div>

<script>
"use strict";

// ═══════════════════════════════════════════════════════
//  CANVAS SETUP
// ═══════════════════════════════════════════════════════
const vc = document.getElementById('vc');
const vctx = vc.getContext('2d');
let SZ, CX, CY, SR;

function sizeCanvas(){
    const land = window.innerWidth > window.innerHeight && window.innerHeight < 500;
    let sz;
    if(land){
        const col = Math.round(window.innerWidth * 0.42);
        sz = Math.min(col, window.innerHeight - 60) - 30;
    } else {
        const avail = window.innerHeight - 370;
        sz = Math.min(Math.round(window.innerWidth * 0.57), avail, 200);
    }
    SZ = Math.max(sz, 85);
    vc.width = vc.height = SZ;
    vc.style.width = vc.style.height = SZ + 'px';
    CX = CY = SZ / 2; SR = SZ * 0.455;
}
sizeCanvas();
let _rt;
window.addEventListener('resize', ()=>{ clearTimeout(_rt); _rt=setTimeout(()=>{ sizeCanvas(); rebuildStars(); },150); });
window.addEventListener('orientationchange', ()=>{ setTimeout(()=>{ sizeCanvas(); rebuildStars(); },300); });

// ═══════════════════════════════════════════════════════
//  GEODESIC SPHERE
// ═══════════════════════════════════════════════════════
const GN=[], GE=[];
(function(){
    const LD=10, LO=20;
    for(let li=0;li<=LD;li++){
        const frac=li/LD, lat=-Math.PI/2+Math.PI*frac;
        const type=frac<0.33?'lo':frac>0.66?'hi':'mid';
        const fi=type==='lo'?Math.floor(Math.random()*5):type==='hi'?19+Math.floor(Math.random()*37):5+Math.floor(Math.random()*14);
        const cnt=Math.max(1,Math.round(LO*Math.cos(lat)));
        for(let lj=0;lj<cnt;lj++) GN.push({lat,lon:2*Math.PI*lj/cnt+(li%2?.18:0),type,fi});
    }
    for(let a=0;a<GN.length;a++) for(let b=a+1;b<GN.length;b++){
        const na=GN[a],nb=GN[b];
        let dl=Math.abs(na.lon-nb.lon); if(dl>Math.PI)dl=2*Math.PI-dl;
        if(Math.sqrt((na.lat-nb.lat)**2+(dl*Math.cos((na.lat+nb.lat)/2))**2)<0.40) GE.push([a,b]);
    }
})();
function proj(lat,lon,rY){
    const cl=Math.cos(lat),sl=Math.sin(lat),co=Math.cos(lon+rY),so=Math.sin(lon+rY);
    return{x:CX+cl*so*SR, y:CY-sl*SR, z:cl*co};
}

const BANDS=[...Array(18).fill('lo'),...Array(16).fill('mid'),...Array(18).fill('hi')];
let STARS=[];
function makeStars(){
    return BANDS.map(band=>{
        const oR=0.13+Math.random()*0.68,dir=Math.random()<0.3?-1:1;
        const spd=dir*(0.055+Math.random()*0.20)/Math.sqrt(oR);
        const iB=band==='lo'?(Math.random()-0.5)*0.55:band==='hi'?Math.PI*.5+(Math.random()-.5)*.7:(Math.random()-.5)*Math.PI;
        const fi=band==='lo'?Math.floor(Math.random()*5):band==='hi'?19+Math.floor(Math.random()*35):5+Math.floor(Math.random()*14);
        const ecc=Math.random()*0.42;
        return{band,fi,hue:band,oR,spd,iB,
            aN0:Math.random()*Math.PI*2,pR:(Math.random()-.5)*.012,
            wA:.02+Math.random()*.08,wS:.008+Math.random()*.025,wP:Math.random()*Math.PI*2,
            ecc,ph:Math.random()*Math.PI*2,sz:.10+Math.random()*.48*(1-oR*.3),
            bOp:.20+Math.random()*.50,tSpd:.5+Math.random()*2.5,
            tAmp:.08+Math.random()*.28,tPh:Math.random()*Math.PI*2,
            tLen:3+Math.floor(Math.random()*5),tDt:.18+Math.random()*.25};
    });
}
STARS=makeStars();
function rebuildStars(){ STARS=makeStars(); }
function starPos(s,t,off){
    const te=t-(off||0),asc=s.aN0+s.pR*te;
    const inc=s.iB+s.wA*Math.sin(s.wS*te+s.wP);
    const M=s.ph+s.spd*te,E=M+s.ecc*Math.sin(M);
    const trA=2*Math.atan2(Math.sqrt(1+s.ecc)*Math.sin(E/2),Math.sqrt(1-s.ecc)*Math.cos(E/2));
    const r=Math.min(s.oR*SR*(1-s.ecc*s.ecc)/(1+s.ecc*Math.cos(trA)),SR*0.87);
    const xO=r*Math.cos(trA),yO=r*Math.sin(trA);
    const cI=Math.cos(inc),sI=Math.sin(inc),cN=Math.cos(asc),sN=Math.sin(asc);
    return{sx:CX+cN*xO-sN*yO*cI,sy:CY-(sN*xO+cN*yO*cI),depth:(yO*sI)/SR};
}

// ═══════════════════════════════════════════════════════
//  SKY STARFIELD
// ═══════════════════════════════════════════════════════
(function(){
    const sky=document.getElementById('sky'),sc=sky.getContext('2d');
    let sw,sh,SS=[];
    const COLS=[[190,240,255],[210,255,248],[200,220,255],[180,210,255],[155,235,255]];
    function mkS(){
        SS=[];
        const n=Math.round(sw*sh/1800);
        for(let i=0;i<n;i++){
            const col=COLS[Math.random()<0.6?0:Math.floor(Math.random()*COLS.length)];
            const sz=Math.random()<0.92?.25+Math.random()*.6:.8+Math.random();
            SS.push({x:Math.random()*sw,y:Math.random()*sh,sz,col,
                ba:.35+Math.random()*.55,ts:.4+Math.random()*2.2,
                ta:.06+Math.random()*.28,tp:Math.random()*Math.PI*2,
                dx:(Math.random()-.5)*.012,dy:(Math.random()-.5)*.006});
        }
    }
    function rsz(){ sw=sky.width=window.innerWidth; sh=sky.height=window.innerHeight; mkS(); }
    rsz(); window.addEventListener('resize',rsz);
    (function loop(){
        requestAnimationFrame(loop);
        const t=Date.now()/1000;
        const g=sc.createLinearGradient(0,0,0,sh);
        g.addColorStop(0,'#07080c'); g.addColorStop(.5,'#060608'); g.addColorStop(1,'#040406');
        sc.fillStyle=g; sc.fillRect(0,0,sw,sh);
        [[sw*.15,sh*.2,sw*.28],[sw*.78,sh*.6,sw*.22],[sw*.5,sh*.85,sw*.18]].forEach(([nx,ny,nr])=>{
            const ng=sc.createRadialGradient(nx,ny,0,nx,ny,nr);
            ng.addColorStop(0,'rgba(0,50,42,0.07)'); ng.addColorStop(1,'rgba(0,0,0,0)');
            sc.fillStyle=ng; sc.fillRect(0,0,sw,sh);
        });
        SS.forEach(s=>{
            s.x=(s.x+s.dx+sw)%sw; s.y=(s.y+s.dy+sh)%sh;
            const tw=1+s.ta*Math.sin(t*s.ts+s.tp),al=Math.min(1,s.ba*tw);
            const[r,g2,b]=s.col;
            if(s.sz>.7){
                const h=sc.createRadialGradient(s.x,s.y,0,s.x,s.y,s.sz*3.5);
                h.addColorStop(0,`rgba(${r},${g2},${b},${al*.3})`); h.addColorStop(1,'rgba(0,0,0,0)');
                sc.beginPath(); sc.arc(s.x,s.y,s.sz*3.5,0,Math.PI*2); sc.fillStyle=h; sc.fill();
            }
            sc.beginPath(); sc.arc(s.x,s.y,Math.max(.2,s.sz),0,Math.PI*2);
            sc.fillStyle=`rgba(${r},${g2},${b},${al})`; sc.fill();
        });
    })();
})();

const isIOS = /iP(hone|ad|od)/.test(navigator.userAgent) ||
              (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);

// ═══════════════════════════════════════════════════════
//  AUDIO ENGINE STATE
// ═══════════════════════════════════════════════════════
let actx=null, analyser=null, srcNode=null, stream=null;
let bbeHi, bbePresence, bbeWave;
let fbqN1, fbqN2, fbqN3;
let afsN1, afsN2, afsN3;
let seriesGain, parallelGain;
let loShelf, afsLo1, afsLo2, afsLo3, loGain;
let sumNode, limiter, masterGain, gateGain;
// Voice suppression filters (notch out human vocal range 300–3400 Hz when mic input)
let voiceNotch1, voiceNotch2, voiceNotch3, voiceNotch4, voiceHP, voiceMuteGain;
let gateEnv=0, gateOpen=false;
let afsMidTimer=null, afsLoTimer=null, gateTimer=null;
let isLive=false, isBypassed=false, isMicInput=false, hpConfirmed=false;
let sinkId='default';

const btBar    = document.getElementById('bt-bar');
const btSelect = document.getElementById('bt-select');

async function loadOutputDevices(){
    try {
        const devices = await navigator.mediaDevices.enumerateDevices();
        const outs    = devices.filter(d=>d.kind==='audiooutput');
        if(!outs.length){ btBar.classList.remove('show'); return; }
        btSelect.innerHTML='';
        outs.forEach(d=>{
            const opt=document.createElement('option');
            opt.value=d.deviceId;
            let lbl=d.label||(d.deviceId==='default'?'System Default':'Audio Output');
            const isBT=/bluetooth|airpod|buds|bose|sony|jabra|beats|jbl|wireless|headset|earphone|sennheiser|anker/i.test(lbl);
            if(d.deviceId==='default') opt.textContent='\uD83D\uDD0A '+lbl;
            else if(isBT)              opt.textContent='\uD83C\uDFA7 '+lbl.slice(0,36);
            else                       opt.textContent='\uD83D\uDD0A '+lbl.slice(0,36);
            opt.selected=(d.deviceId===sinkId);
            btSelect.appendChild(opt);
        });
        btBar.classList.add('show');
    } catch(e){ console.warn('enumerateDevices:',e); }
}

btSelect.addEventListener('change', async ()=>{

// ═══════════════════════════════════════════════════════
//  NODE FACTORY
// ═══════════════════════════════════════════════════════
function buildNodes(){
    // ── BBE 882i: Hi-Def shelving + presence peak ──────────────────────────────
    bbeHi=actx.createBiquadFilter(); bbeHi.type='highshelf'; bbeHi.frequency.value=3200; bbeHi.gain.value=0;
    bbePresence=actx.createBiquadFilter(); bbePresence.type='peaking'; bbePresence.frequency.value=4800; bbePresence.Q.value=0.7; bbePresence.gain.value=0;
    bbeWave=actx.createWaveShaper(); bbeWave.oversample='4x'; setWaveshaper(0);

    // ── Pre-gain before series chain — this is what drives audible volume ──────
    // Gives the BBE path real headroom to push through the limiter
    seriesGain=actx.createGain(); seriesGain.gain.value=1.0;

    // ── FBQ1000: notch muddy resonances, then re-amplify ──────────────────────
    fbqN1=actx.createBiquadFilter(); fbqN1.type='notch'; fbqN1.frequency.value=400;  fbqN1.Q.value=8;
    fbqN2=actx.createBiquadFilter(); fbqN2.type='notch'; fbqN2.frequency.value=800;  fbqN2.Q.value=8;
    fbqN3=actx.createBiquadFilter(); fbqN3.type='notch'; fbqN3.frequency.value=2500; fbqN3.Q.value=8;

    // ── DBX AFS-2 parallel path ────────────────────────────────────────────────
    afsN1=actx.createBiquadFilter(); afsN1.type='notch'; afsN1.frequency.value=630;  afsN1.Q.value=12;
    afsN2=actx.createBiquadFilter(); afsN2.type='notch'; afsN2.frequency.value=1250; afsN2.Q.value=12;
    afsN3=actx.createBiquadFilter(); afsN3.type='notch'; afsN3.frequency.value=3150; afsN3.Q.value=12;
    parallelGain=actx.createGain(); parallelGain.gain.value=1.0;

    // ── BBE Lo Contour + AFS lo ────────────────────────────────────────────────
    loShelf=actx.createBiquadFilter(); loShelf.type='lowshelf'; loShelf.frequency.value=getContourFreq(); loShelf.gain.value=0;
    afsLo1=actx.createBiquadFilter(); afsLo1.type='notch'; afsLo1.frequency.value=100; afsLo1.Q.value=6;
    afsLo2=actx.createBiquadFilter(); afsLo2.type='notch'; afsLo2.frequency.value=200; afsLo2.Q.value=6;
    afsLo3=actx.createBiquadFilter(); afsLo3.type='notch'; afsLo3.frequency.value=160; afsLo3.Q.value=6;
    loGain=actx.createGain(); loGain.gain.value=0;

    // ── Voice suppression (mic mode only) ────────────────────────────────────
    voiceHP=actx.createBiquadFilter(); voiceHP.type='highpass'; voiceHP.frequency.value=300; voiceHP.Q.value=0.7;
    voiceNotch1=actx.createBiquadFilter(); voiceNotch1.type='notch'; voiceNotch1.frequency.value=500;  voiceNotch1.Q.value=3;
    voiceNotch2=actx.createBiquadFilter(); voiceNotch2.type='notch'; voiceNotch2.frequency.value=1000; voiceNotch2.Q.value=3;
    voiceNotch3=actx.createBiquadFilter(); voiceNotch3.type='notch'; voiceNotch3.frequency.value=2000; voiceNotch3.Q.value=3;
    voiceNotch4=actx.createBiquadFilter(); voiceNotch4.type='notch'; voiceNotch4.frequency.value=3400; voiceNotch4.Q.value=3;
    voiceMuteGain=actx.createGain(); voiceMuteGain.gain.value=1;

    // ── Sum → soft-knee limiter → master output gain ──────────────────────────
    // sumNode compensates for 3 parallel paths: divide each by ~1 (paths add to sum)
    sumNode=actx.createGain(); sumNode.gain.value=0.45;  // mix-down of 3 paths without clipping

    limiter=actx.createDynamicsCompressor();
    limiter.threshold.value=-6;    // start compressing at -6 dBFS
    limiter.knee.value=6;          // soft knee for transparent pumping
    limiter.ratio.value=12;        // 12:1 — strong limiting without brick-wall hardness
    limiter.attack.value=0.003;
    limiter.release.value=0.08;

    // master output: push final level up so user HEARS the boost
    masterGain=actx.createGain(); masterGain.gain.value=2.2;

    gateGain=actx.createGain(); gateGain.gain.value=0;
}

function wireGraph(withVoiceSuppression){
    // Insert voice suppression after source if mic input
    let effectiveSrc;
    if(withVoiceSuppression){
        // Silence the vocal range: HP + cascaded notches + gain mute
        srcNode.connect(voiceHP);
        voiceHP.connect(voiceNotch1);
        voiceNotch1.connect(voiceNotch2);
        voiceNotch2.connect(voiceNotch3);
        voiceNotch3.connect(voiceNotch4);
        voiceNotch4.connect(voiceMuteGain);
        // voiceMuteGain set to 0 = silence user voice back into speakers
        voiceMuteGain.gain.value = 0;
        effectiveSrc = voiceMuteGain;
    } else {
        effectiveSrc = srcNode;
    }

    effectiveSrc.connect(bbeHi); bbeHi.connect(bbePresence); bbePresence.connect(bbeWave);
    bbeWave.connect(fbqN1); fbqN1.connect(fbqN2); fbqN2.connect(fbqN3);
    fbqN3.connect(seriesGain); seriesGain.connect(sumNode);

    effectiveSrc.connect(afsN1); afsN1.connect(afsN2); afsN2.connect(afsN3);
    afsN3.connect(parallelGain); parallelGain.connect(sumNode);

    effectiveSrc.connect(loShelf); loShelf.connect(afsLo1); afsLo1.connect(afsLo2); afsLo2.connect(afsLo3);
    afsLo3.connect(loGain); loGain.connect(sumNode);

    sumNode.connect(limiter); limiter.connect(masterGain);
    masterGain.connect(gateGain); gateGain.connect(analyser);
    analyser.connect(actx.destination);

    if(typeof actx.setSinkId==='function' && sinkId && sinkId!=='default')
        actx.setSinkId(sinkId).catch(()=>{});
}

function buildGraphFromStream(src, micInput){
    actx=new(window.AudioContext||window.webkitAudioContext)({sampleRate:44100,latencyHint:'playback'});
    analyser=actx.createAnalyser(); analyser.fftSize=2048; analyser.smoothingTimeConstant=0.82;
    srcNode=actx.createMediaStreamSource(src);
    buildNodes(); wireGraph(micInput);
    startAFS_Mid(); startAFS_Lo();
    applyBoost(getKnobVal('boost')); applyBass(getKnobVal('bass'));
}

// createMediaElementSource() can only be called ONCE per element — ever.
// After that reuse srcNode and just swap audioEl.src.
let _elemSrcCreated = false;

function buildGraphFromElement(audioEl){
    // Create or resume AudioContext
    if(!actx || actx.state === 'closed'){
        actx = new(window.AudioContext||window.webkitAudioContext)({sampleRate:44100, latencyHint:'playback'});
    }
    if(actx.state === 'suspended') actx.resume();

    if(!_elemSrcCreated){
        analyser = actx.createAnalyser();
        analyser.fftSize = 2048;
        analyser.smoothingTimeConstant = 0.82;
        srcNode = actx.createMediaElementSource(audioEl);
        _elemSrcCreated = true;
        buildNodes();
        wireGraph(false);
    }
    hpConfirmed = true;
    gateGain.gain.value = 1;
    startAFS_Mid(); startAFS_Lo();
    applyBoost(getKnobVal('boost')); applyBass(getKnobVal('bass'));
}

// ═══════════════════════════════════════════════════════
//  DSP FUNCTIONS
// ═══════════════════════════════════════════════════════
function setWaveshaper(drive){
    const n=512, curve=new Float32Array(n);
    const k = drive * 8;  // scale drive: 0 = clean passthrough, >1 = saturated
    for(let i=0;i<n;i++){
        const x=(i*2/n)-1;
        if(k===0){
            curve[i]=x;
        } else {
            // Modified sigmoid saturation: adds harmonics, increases perceived loudness
            curve[i] = (Math.PI + k) * x / (Math.PI + k * Math.abs(x));
        }
    }
    bbeWave.curve=curve;
}

function applyBoost(v){
    if(!actx) return;
    // v = 0..1. At v=1: +18dB hi-shelf, +14dB presence peak, strong saturation,
    // big linear drive through series+parallel gain paths.
    const lin = Math.pow(10, (v * 24) / 20); // up to +24dB linear gain factor

    // BBE 882i Hi-Def: high-shelf boost (air/sparkle above 3.2kHz)
    bbeHi.gain.value = v * 18;          // 0 to +18 dB
    // BBE presence peak: punch at 4.8kHz (cuts through mix)
    bbePresence.gain.value = v * 14;    // 0 to +14 dB
    // Waveshaper saturation: adds harmonic density, perceived loudness
    setWaveshaper(v * 1.4);             // more aggressive saturation curve

    // FBQ notch depths: deeper cuts = cleaner boost (removes mud before amplifying)
    const nd = -(v * 9);
    fbqN1.gain.value = nd; fbqN2.gain.value = nd; fbqN3.gain.value = nd;

    // Drive both paths with the linear gain — this is what moves the needle
    seriesGain.gain.value   = lin * 0.55;
    parallelGain.gain.value = lin * 0.45;
}

function applyBass(v){
    if(!actx) return;
    // v = 0..1. At v=1: +18dB low-shelf (big sub thump), deep AFS lo notches
    loShelf.gain.value = v * 18;        // 0 to +18 dB low-shelf
    const nd = -(v * 8);
    afsLo1.gain.value = nd; afsLo2.gain.value = nd; afsLo3.gain.value = nd;
    // loGain drives the lo path amplitude
    loGain.gain.value = 0.3 + v * 1.4; // 0.3 minimum, up to 1.7 at max
}

function applyBypass(on){
    if(!actx) return;
    if(on){
        bbeHi.gain.value=0; bbePresence.gain.value=0; setWaveshaper(0);
        fbqN1.gain.value=0; fbqN2.gain.value=0; fbqN3.gain.value=0;
        seriesGain.gain.value=0.55; parallelGain.gain.value=0.45;
        loShelf.gain.value=0; afsLo1.gain.value=0; afsLo2.gain.value=0; afsLo3.gain.value=0;
        loGain.gain.value=0.3;
        masterGain.gain.value=1.0;
    } else {
        applyBoost(getKnobVal('boost')); applyBass(getKnobVal('bass'));
        masterGain.gain.value=2.2;
        if(hpConfirmed && gateGain && actx)
            gateGain.gain.setTargetAtTime(1,actx.currentTime,0.05);
    }
}

function startAFS_Mid(){
    if(afsMidTimer) clearInterval(afsMidTimer);
    afsMidTimer=setInterval(()=>{
        if(!analyser||!isLive) return;
        const bins=analyser.frequencyBinCount,fd=new Float32Array(bins);
        analyser.getFloatFrequencyData(fd);
        const sr=actx.sampleRate;
        const lo=Math.floor(200/(sr/2)*bins),hi=Math.ceil(7000/(sr/2)*bins);
        let pBin=lo,pVal=-Infinity;
        for(let i=lo;i<hi;i++) if(fd[i]>pVal){pVal=fd[i];pBin=i;}
        if(pVal>-22) afsN3.frequency.value=afsN3.frequency.value*0.72+(pBin/bins)*(sr/2)*0.28;
    },500);
}

function startAFS_Lo(){
    if(afsLoTimer) clearInterval(afsLoTimer);
    afsLoTimer=setInterval(()=>{
        if(!analyser||!isLive) return;
        const bins=analyser.frequencyBinCount,fd=new Float32Array(bins);
        analyser.getFloatFrequencyData(fd);
        const sr=actx.sampleRate;
        const lo=Math.floor(60/(sr/2)*bins),hi=Math.ceil(400/(sr/2)*bins);
        let pBin=lo,pVal=-Infinity;
        for(let i=lo;i<hi;i++) if(fd[i]>pVal){pVal=fd[i];pBin=i;}
        if(pVal>-28) afsLo3.frequency.value=afsLo3.frequency.value*0.75+(pBin/bins)*(sr/2)*0.25;
    },700);
}

function getContourFreq(){
    const w=Math.min(window.screen.width,window.screen.height);
    return w<400?200:w<768?165:120;
}

function confirmHeadphones(){
    if(!actx||!gateGain) return;
    hpConfirmed=true;
    // With headphones confirmed, we can allow the processed signal through
    // but voice mute stays active (voiceMuteGain=0 persists from wireGraph)
    gateGain.gain.setTargetAtTime(1,actx.currentTime,0.05);
    document.getElementById('btn-confirm').classList.remove('show');
    document.getElementById('mic-mute-indicator').classList.add('show');
    chip.textContent='\u2713 HEADPHONES ACTIVE \u00B7 VOICE MUTED';
    chip.className='chip ok';
    setStatus('ENHANCING \u00B7 VOICE SUPPRESSED');
    setPill('LIVE','live');
    startNoiseGate();
}

function startNoiseGate(){
    if(gateTimer) clearInterval(gateTimer);
    gateTimer=setInterval(()=>{
        if(!analyser||!isLive||!hpConfirmed) return;
        const fd=new Uint8Array(analyser.frequencyBinCount);
        analyser.getByteFrequencyData(fd);
        const sr=actx.sampleRate,bins=fd.length;
        const loB=Math.floor(300/(sr/2)*bins);
        let s=0,cnt=0;
        for(let i=loB;i<bins;i++){s+=fd[i]*fd[i];cnt++;}
        const rms=Math.sqrt(s/cnt)/255;
        gateEnv=rms>gateEnv?gateEnv*0.85+rms*0.15:gateEnv*0.95+rms*0.05;
        const want=gateEnv>0.04;
        if(want!==gateOpen){
            gateOpen=want;
            gateGain.gain.setTargetAtTime(want?1:0,actx.currentTime,want?0.008:0.035);
        }
    },20);
}

// ═══════════════════════════════════════════════════════
//  iOS SOURCE LOADER
// ═══════════════════════════════════════════════════════
const iosAudioEl = document.getElementById('ios-audio');

function initFileLoader(){
    // Show the file/URL section on ALL platforms
    document.getElementById('ios-src').classList.add('show');

    document.getElementById('ios-file').addEventListener('change', e=>{
        const file = e.target.files[0];
        if(!file) return;
        const url = URL.createObjectURL(file);
        iosPlay(url, file.name);
    });

    document.getElementById('ios-url-btn').addEventListener('click',()=>{
        document.getElementById('ios-url-row').classList.toggle('open');
    });

    document.getElementById('ios-url-load').addEventListener('click',()=>{
        const url = document.getElementById('ios-url-inp').value.trim();
        if(!url){ setStatus('ENTER A VALID URL'); return; }
        const label = url.split('/').pop().split('?')[0].slice(0,32) || 'STREAM';
        iosPlay(url, label);
    });

    document.getElementById('ios-bypass').addEventListener('click',()=>{
        isBypassed = !isBypassed;
        applyBypass(isBypassed);
        const b = document.getElementById('ios-bypass');
        b.classList.toggle('on', isBypassed);
        b.textContent = isBypassed ? '\u25BA ENHANCE' : '\u2298 BYPASS';
        setPill(isBypassed?'BYPASS':'LIVE', isBypassed?'err':'live');
        setStatus(isBypassed?'BYPASSED \u00B7 PASSTHROUGH':'ENHANCING \u00B7 ACTIVE');
    });

    // On iOS: hide system capture buttons (can't capture system audio)
    if(isIOS){
        document.getElementById('capture-row').style.display = 'none';
        setStatus('LOAD FILE OR URL TO BOOST');
        chip.textContent = 'iOS \u00B7 FILE / URL MODE';
    } else {
        setStatus('CAPTURE SYSTEM AUDIO OR LOAD FILE');
    }
}

function iosPlay(url, label){
    // Stop any current playback
    iosAudioEl.pause();

    // Wire the graph first (reuses existing context/nodes if already built)
    buildGraphFromElement(iosAudioEl);
    loadOutputDevices();

    // Set source AFTER graph is wired — changing src on a connected element is safe
    iosAudioEl.src = url;
    iosAudioEl.loop = false;
    iosAudioEl.volume = 1;
    iosAudioEl.crossOrigin = 'anonymous';

    // Ensure AudioContext is running before play()
    const doPlay = () => {
        if(actx && actx.state === 'suspended') actx.resume();
        const playPromise = iosAudioEl.play();
        if(playPromise !== undefined){
            playPromise.then(()=>{
                isLive = true;
                setPill('LIVE','live');
                setStatus('ENHANCING \u00B7 ACTIVE');
                document.getElementById('ios-now-playing').textContent = '\u25B6 ' + label.toUpperCase().slice(0,34);
                chip.textContent = 'SOURCE: ' + label.slice(0,36).toUpperCase();
                chip.className = 'chip ok';
            }).catch(err=>{
                console.warn('play() blocked:', err);
                // Show native player as fallback — user taps play manually
                iosAudioEl.style.cssText = 'display:block; width:100%; margin-top:8px; filter:invert(0.8) hue-rotate(120deg);';
                iosAudioEl.controls = true;
                setStatus('TAP \u25B6 ON PLAYER BELOW');
                chip.textContent = 'TAP PLAY TO START · AUTOPLAY BLOCKED';
                chip.className = 'chip warn';
                iosAudioEl.addEventListener('play', ()=>{
                    if(actx && actx.state === 'suspended') actx.resume();
                    isLive = true;
                    setPill('LIVE','live');
                    setStatus('ENHANCING \u00B7 ACTIVE');
                    document.getElementById('ios-now-playing').textContent = '\u25B6 ' + label.toUpperCase().slice(0,34);
                    chip.textContent = 'SOURCE: ' + label.slice(0,36).toUpperCase();
                    chip.className = 'chip ok';
                }, {once:true});
            });
        }
    };

    // canplaythrough = file is ready; use timeout as safety fallback
    iosAudioEl.addEventListener('canplay', doPlay, {once:true});
    iosAudioEl.addEventListener('error', ()=>{
        setStatus('LOAD FAILED \u00B7 CHECK URL / FORMAT');
        chip.textContent = 'ERROR: CANNOT LOAD SOURCE · TRY MP3 OR WAV';
        chip.className = 'chip warn';
        setPill('ERROR','err');
        isLive = false;
    }, {once:true});
    iosAudioEl.load(); // trigger load after src is set

    iosAudioEl.addEventListener('ended', ()=>{
        isLive = false;
        setPill('DONE','warn');
        setStatus('PLAYBACK COMPLETE \u00B7 LOAD ANOTHER FILE');
    }, {once:true});
}

// ═══════════════════════════════════════════════════════
//  DESKTOP/ANDROID CAPTURE
// ═══════════════════════════════════════════════════════
const btnCapture = document.getElementById('btn-capture');
const btnBypass  = document.getElementById('btn-bypass');
const pillEl     = document.getElementById('pill');
const statusEl   = document.getElementById('status');
const chip       = document.getElementById('chip');

function setStatus(msg){ statusEl.textContent=msg; }
function setPill(txt,cls){ pillEl.className='pill '+(cls||''); pillEl.textContent=txt; }

async function startCapture(){
    if(isLive){ stopCapture(); return; }
    setStatus('REQUESTING AUDIO\u2026');
    try {
        let src; isMicInput=false;
        if(navigator.mediaDevices.getDisplayMedia){
            try {
                src=await navigator.mediaDevices.getDisplayMedia({
                    video:false,
                    audio:{echoCancellation:false,noiseSuppression:false,autoGainControl:false,sampleRate:44100}
                });
                chip.textContent='SOURCE: SYSTEM / TAB AUDIO'; chip.className='chip ok';
            } catch(e){
                if(e.name==='NotAllowedError'||e.name==='AbortError'){
                    setStatus('CAPTURE DENIED'); setPill('DENIED','err'); return;
                }
                src=await getMic(); if(!src) return; isMicInput=true;
            }
        } else {
            src=await getMic(); if(!src) return; isMicInput=true;
        }

        stream=src;
        buildGraphFromStream(src, isMicInput);
        loadOutputDevices();
        isLive=true;
        btnCapture.textContent='\u25A0 STOP'; btnCapture.classList.add('on');

        if(isMicInput){
            hpConfirmed=false;
            chip.textContent='\u26A0 PLUG IN HEADPHONES THEN TAP CONFIRM'; chip.className='chip warn';
            setPill('MUTED','warn'); setStatus('PLUG IN HEADPHONES \u00B7 TAP CONFIRM');
            document.getElementById('btn-confirm').classList.add('show');
        } else {
            hpConfirmed=true;
            gateGain.gain.setTargetAtTime(1,actx.currentTime,0.05);
            setPill('LIVE','live'); setStatus('ENHANCING \u00B7 ACTIVE');
        }
        stream.getTracks().forEach(t=>t.addEventListener('ended',()=>{ if(isLive) stopCapture(); }));
    } catch(e){
        console.error(e); setStatus('CANNOT ACCESS AUDIO'); setPill('ERROR','err');
        chip.textContent='CHECK BROWSER PERMISSIONS'; chip.className='chip warn';
    }
}

async function getMic(){
    try {
        return await navigator.mediaDevices.getUserMedia({
            audio:{echoCancellation:true,noiseSuppression:true,autoGainControl:false,sampleRate:44100}
        });
    } catch(e){
        setStatus('MIC ACCESS DENIED'); setPill('ERROR','err');
        chip.textContent='ALLOW MICROPHONE PERMISSION'; chip.className='chip warn';
        return null;
    }
}

function stopCapture(){
    iosAudioEl.pause();
    // Only stop stream tracks — don't close actx if element source was built
    // (closing actx would break the persistent MediaElementSource graph)
    if(stream){ stream.getTracks().forEach(t=>t.stop()); stream=null; }
    [afsMidTimer,afsLoTimer,gateTimer].forEach(t=>{ if(t) clearInterval(t); });
    afsMidTimer=afsLoTimer=gateTimer=null;
    // Only close actx for stream-based (mic/system) capture, not element-source
    if(actx && !_elemSrcCreated){ actx.close(); actx=null; analyser=null; srcNode=null; }
    isLive=false; isBypassed=false; isMicInput=false; hpConfirmed=false; gateEnv=0; gateOpen=false;
    document.getElementById('btn-confirm').classList.remove('show');
    document.getElementById('mic-mute-indicator').classList.remove('show');
    document.getElementById('ios-now-playing').textContent='';
    if(!isIOS){
        btnCapture.textContent='\u25BA CAPTURE'; btnCapture.classList.remove('on');
        btnBypass.textContent='\u2298 BYPASS'; btnBypass.classList.remove('on');
    }
    setPill('STANDBY',''); setStatus(isIOS?'LOAD FILE OR URL TO BOOST':'CAPTURE SYSTEM AUDIO OR LOAD FILE');
    chip.textContent='NO SOURCE CONNECTED'; chip.className='chip';
    document.getElementById('lvl-fill').style.width='0%';
    document.getElementById('lvl-db').textContent='\u2014 dB';
}

btnCapture.addEventListener('click', startCapture);
btnBypass.addEventListener('click',()=>{
    if(!isLive){ setStatus('CAPTURE AUDIO FIRST'); return; }
    isBypassed=!isBypassed; applyBypass(isBypassed);
    btnBypass.classList.toggle('on',isBypassed);
    btnBypass.textContent=isBypassed?'\u25BA ENHANCE':'\u2298 BYPASS';
    setPill(isBypassed?'BYPASS':'LIVE',isBypassed?'err':'live');
    setStatus(isBypassed?'BYPASSED \u00B7 PASSTHROUGH':'ENHANCING \u00B7 ACTIVE');
});

// ═══════════════════════════════════════════════════════
//  ROTARY KNOBS — FIXED
//  Geometry: r=32, circumference=201.06
//  Sweep: 270° (from 225° to 135° going clockwise)
//  At 0%: tick at -135deg (7 o'clock). At 100%: tick at +135deg (5 o'clock).
//  Arc length at fraction f: f * (270/360) * 201.06 = f * 150.80
//  Offset: circle starts at 3-o'clock. We want arc to start at 225° (= -135° from top = +225° from 3-o-clock).
//  stroke-dashoffset to shift start point: -(225/360)*201.06 = -125.66
//  But we want to start at 225° CCW from right = 225° in SVG coords.
//  SVG circles go clockwise from 3-o'clock. 225° from 3-o'clock clockwise = 7-o'clock.
//  dashoffset = -(225/360)*CIRC = -125.66 shifts the dash start to 7-o'clock. ✓
// ═══════════════════════════════════════════════════════
const CIRC = 201.06;          // 2 * π * 32
const ARC_MAX = 150.80;       // (270/360) * CIRC
const DASH_OFFSET = -125.66;  // -(225/360) * CIRC  → starts arc at 7-o'clock

function getKnobVal(id){ return parseInt(document.getElementById('knob-'+id).dataset.val)/100; }

function updateKnobUI(id, pct){
    const frac = pct / 100;
    // Tick angle: -135deg at 0%, +135deg at 100%
    const deg = -135 + frac * 270;
    document.getElementById('ktick-'+id).style.transform = `rotate(${deg}deg)`;

    // Arc
    const arcLen = frac * ARC_MAX;
    const arc = document.getElementById('karc-'+id);
    arc.setAttribute('stroke-dasharray', `${arcLen} ${CIRC}`);
    arc.setAttribute('stroke-dashoffset', String(DASH_OFFSET));

    // Colour shift: green→cyan as value increases
    const hue = 165 - frac * 40;
    const col = `hsl(${hue},100%,58%)`;
    arc.setAttribute('stroke', col);
    arc.style.filter = `drop-shadow(0 0 6px ${col})`;
    document.getElementById('ktick-'+id).setAttribute('stroke', col);

    // Label — DEPTH knob (id=boost) shows clarity dB, BOOST knob (id=bass) shows lo dB
    const dB = (frac * 24).toFixed(1);
    const loDB = (frac * 18).toFixed(1);
    document.getElementById('kval-'+id).textContent =
        id === 'boost'
            ? (pct === 0 ? '0 dB' : '+' + dB + ' dB')
            : (pct === 0 ? '0 dB' : '+' + loDB + ' dB');
    document.getElementById('kval-'+id).style.setProperty('-webkit-text-fill-color', col);
    document.getElementById('kval-'+id).style.color = col;

    if(!isBypassed){
        if(id === 'boost') applyBoost(frac);
        if(id === 'bass')  applyBass(frac);
    }
}

function bindKnob(id){
    const el = document.getElementById('knob-'+id);
    let startY, startVal, drag = false;
    const onStart = e => {
        drag = true;
        startY = e.touches ? e.touches[0].clientY : e.clientY;
        startVal = parseInt(el.dataset.val);
        e.preventDefault();
    };
    const onMove = e => {
        if(!drag) return;
        const y = e.touches ? e.touches[0].clientY : e.clientY;
        const delta = Math.round((startY - y) * 0.75);
        const nv = Math.min(100, Math.max(0, startVal + delta));
        el.dataset.val = nv;
        updateKnobUI(id, nv);
        e.preventDefault();
    };
    const onEnd = () => { drag = false; };
    el.addEventListener('touchstart', onStart, {passive:false});
    el.addEventListener('touchmove',  onMove,  {passive:false});
    el.addEventListener('touchend',   onEnd);
    el.addEventListener('mousedown',  onStart);
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup',   onEnd);
    el.addEventListener('wheel', e => {
        const v = parseInt(el.dataset.val);
        const n = Math.min(100, Math.max(0, v + (e.deltaY < 0 ? 2 : -2)));
        el.dataset.val = n;
        updateKnobUI(id, n);
        e.preventDefault();
    }, {passive:false});
    // Double-click to reset to default
    el.addEventListener('dblclick', () => {
        const def = id === 'boost' ? 55 : 35;
        el.dataset.val = def;
        updateKnobUI(id, def);
    });
}

// Sync track arcs to correct geometry on init
document.querySelectorAll('.knob-outer svg circle[stroke="rgba(0,255,204,0.12)"]').forEach(c=>{
    c.setAttribute('stroke-dasharray', `${ARC_MAX} ${CIRC}`);
    c.setAttribute('stroke-dashoffset', String(DASH_OFFSET));
});

bindKnob('boost'); bindKnob('bass');
updateKnobUI('boost', 55); updateKnobUI('bass', 35);

initFileLoader();

// ═══════════════════════════════════════════════════════
//  DRAW LOOP
// ═══════════════════════════════════════════════════════
let rmsSmooth=0;
function draw(){
    requestAnimationFrame(draw);
    const bins=analyser?analyser.frequencyBinCount:64;
    const freq=new Uint8Array(bins);
    if(analyser) analyser.getByteFrequencyData(freq);
    const bV=getKnobVal('boost'), bassV=getKnobVal('bass');

    if(analyser&&isLive){
        let s=0; for(let i=0;i<bins;i++) s+=(freq[i]/255)**2;
        const rms=Math.sqrt(s/bins);
        rmsSmooth=rmsSmooth*0.88+rms*0.12;
        const db=20*Math.log10(Math.max(rmsSmooth,1e-6));
        const pct=Math.min(100,Math.max(0,(db+60)/60*100));
        const hue=165-pct*0.55;
        const fill=document.getElementById('lvl-fill');
        fill.style.width=pct+'%'; fill.style.background=`hsl(${hue},100%,55%)`; fill.style.boxShadow=`0 0 6px hsl(${hue},100%,55%)`;
        document.getElementById('lvl-db').textContent=db>-60?db.toFixed(1)+' dB':'\u2014 dB';
    }

    vctx.clearRect(0,0,SZ,SZ);
    const bg=vctx.createRadialGradient(CX,CY*.85,0,CX,CY,SR*1.05);
    bg.addColorStop(0,'rgba(4,28,22,1)'); bg.addColorStop(.5,'rgba(2,14,12,1)'); bg.addColorStop(1,'rgba(0,4,8,1)');
    vctx.beginPath(); vctx.arc(CX,CY,SR,0,Math.PI*2); vctx.fillStyle=bg; vctx.fill();
    vctx.save(); vctx.beginPath(); vctx.arc(CX,CY,SR-.5,0,Math.PI*2); vctx.clip();

    const t=Date.now()/1000;
    STARS.forEach(s=>{
        const rawF=freq[Math.min(s.fi,bins-1)]/255;
        const boost=s.band==='lo'?bassV*.6:s.band==='hi'?bV*.6:bV*.4;
        const energy=Math.min(1,rawF+boost);
        let cr,cg,cb;
        if(s.hue==='lo'){cr=0;cg=210;cb=140;}else if(s.hue==='hi'){cr=170;cg=235;cb=255;}else{cr=0;cg=255;cb=215;}
        const bl=energy*.68;
        const r=Math.round(cr+(255-cr)*bl),g=Math.round(cg+(255-cg)*bl*.45),b=Math.round(cb+(255-cb)*bl*.25);
        for(let st=s.tLen;st>=1;st--){
            const gh=starPos(s,t,st*s.tDt); if(gh.depth<-.05)continue;
            const gd=.28+.72*((gh.depth+1)/2),fd=1-st/(s.tLen+1);
            vctx.beginPath(); vctx.arc(gh.sx,gh.sy,Math.max(.1,s.sz*.55*fd*gd),0,Math.PI*2);
            vctx.fillStyle=`rgba(${cr},${cg},${cb},${fd*.18*gd*(.4+energy*.5)})`; vctx.fill();
        }
        const pos=starPos(s,t); if(pos.depth<-.08)return;
        const da=.28+.72*((pos.depth+1)/2),ds=.50+.50*((pos.depth+1)/2);
        const tw=1+(s.tAmp+energy*.22)*Math.sin(t*s.tSpd+s.tPh);
        const al=Math.min(1,(s.bOp+energy*.45)*da*tw);
        const rad=(s.sz+energy*1.1)*ds,hR=Math.max(rad*2.5,rad*2.5+energy*4.5);
        if(al>.08){
            const gw=vctx.createRadialGradient(pos.sx,pos.sy,0,pos.sx,pos.sy,hR);
            gw.addColorStop(0,`rgba(${r},${g},${b},${al*(.28+energy*.38)})`);
            gw.addColorStop(.5,`rgba(${cr},${cg},${cb},${al*.05})`);
            gw.addColorStop(1,'rgba(0,0,0,0)');
            vctx.beginPath(); vctx.arc(pos.sx,pos.sy,hR,0,Math.PI*2); vctx.fillStyle=gw; vctx.fill();
        }
        vctx.beginPath(); vctx.arc(pos.sx,pos.sy,Math.max(.18,rad),0,Math.PI*2);
        vctx.fillStyle=`rgba(${r},${g},${b},${Math.min(1,al)})`; vctx.fill();
    });

    const rotY=(Date.now()/1000)*.16, P=GN.map(n=>proj(n.lat,n.lon,rotY));
    GE.map(([a,b])=>({a,b,pa:P[a],pb:P[b],mZ:(P[a].z+P[b].z)/2}))
      .sort((x,y)=>x.mZ-y.mZ)
      .forEach(({a,b,pa,pb,mZ})=>{
        if(pa.z<0&&pb.z<0)return;
        const vis=Math.min(1,Math.max(0,mZ+.18)*3.5); if(vis<=0)return;
        const na=GN[a],nb=GN[b];
        const e=(freq[Math.min(na.fi,bins-1)]+freq[Math.min(nb.fi,bins-1)])/(2*255);
        const[r,g,b2]=na.type==='lo'?[0,200,155]:na.type==='hi'?[160,245,255]:[0,255,215];
        vctx.beginPath(); vctx.moveTo(pa.x,pa.y); vctx.lineTo(pb.x,pb.y);
        vctx.strokeStyle=`rgba(${r},${g},${b2},${Math.min(.55,(.04+e*.38)*vis)})`;
        vctx.lineWidth=.4+e*.85; vctx.stroke();
    });
    GN.forEach((n,i)=>{
        const p=P[i]; if(p.z<-.12)return;
        const rV=freq[Math.min(n.fi,bins-1)]/255;
        const boost=n.type==='lo'?bassV*.55:n.type==='hi'?bV*.55:bV*.35;
        const energy=Math.min(1,rV+boost),vis=Math.max(0,p.z+.18);
        const dotR=Math.max(.3,(.8+energy*3.8)*vis);
        const[cr,cg,cb]=n.type==='lo'?[0,210,140]:n.type==='hi'?[170,240,255]:[0,255,210];
        if(energy>.06){
            const gw=vctx.createRadialGradient(p.x,p.y,0,p.x,p.y,dotR*5);
            gw.addColorStop(0,`rgba(${cr},${cg},${cb},${energy*.55*vis})`);
            gw.addColorStop(.4,`rgba(${cr},${cg},${cb},${energy*.12*vis})`);
            gw.addColorStop(1,'rgba(0,0,0,0)');
            vctx.beginPath(); vctx.arc(p.x,p.y,dotR*5,0,Math.PI*2); vctx.fillStyle=gw; vctx.fill();
        }
        const wm=energy*.85;
        vctx.beginPath(); vctx.arc(p.x,p.y,dotR,0,Math.PI*2);
        vctx.fillStyle=`rgba(${Math.round(cr+(255-cr)*wm)},${Math.round(cg+(255-cg)*wm*.4)},${Math.round(cb+(255-cb)*wm*.25)},${Math.min(1,.45+energy*.75)*vis})`;
        vctx.fill();
    });

    vctx.restore();
    const sp=vctx.createRadialGradient(CX-SR*.38,CY-SR*.38,0,CX,CY,SR);
    sp.addColorStop(0,'rgba(0,255,200,.08)'); sp.addColorStop(.55,'rgba(0,255,200,.01)'); sp.addColorStop(1,'rgba(0,0,0,0)');
    vctx.beginPath(); vctx.arc(CX,CY,SR,0,Math.PI*2); vctx.fillStyle=sp; vctx.fill();
    vctx.beginPath(); vctx.arc(CX,CY,SR,0,Math.PI*2); vctx.strokeStyle='rgba(0,255,204,.32)'; vctx.lineWidth=1.8; vctx.stroke();
}
draw();

vc.addEventListener('touchmove', e=>e.preventDefault(),{passive:false});
vc.addEventListener('touchstart',e=>e.preventDefault(),{passive:false});
document.addEventListener('touchmove',e=>{ if(e.target.closest('.knob-outer,#bt-select,#ios-url-inp'))return; e.preventDefault(); },{passive:false});
</script>
