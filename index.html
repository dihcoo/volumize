<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Depth Impact Hybrid</title>
    <style>
        :root { --neon: #00ffcc; --bg: #0a0a0a; --panel: #141414; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; font-family: -apple-system, sans-serif; margin: 0; display: flex; justify-content: center; height: 100vh; width: 100vw; overflow: hidden; }
        
        .app-container { background: var(--panel); width: 100%; height: 100%; display: flex; flex-direction: column; }
        .top-header { padding: 12px; background: #000; border-bottom: 2px solid var(--neon); text-align: center; flex-shrink: 0; }
        .top-header h1 { margin: 0; font-size: 1rem; letter-spacing: 3px; text-transform: uppercase; }

        /* Responsive Visualizer Area */
        .main-interface { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px; overflow: hidden; }
        
        @media (orientation: landscape) {
            .main-interface { flex-direction: row; justify-content: space-around; }
            .playlist-area { width: 30%; height: 60%; }
        }

        .globe-wrapper { position: relative; width: 220px; height: 220px; flex-shrink: 0; }
        canvas { display: block; width: 220px; height: 220px; border-radius: 50%; z-index: 2; }
        .globe-ring { position: absolute; top: -5px; left: -5px; width: 230px; height: 230px; border: 1.5px solid rgba(0, 255, 204, 0.4); border-radius: 50%; box-shadow: 0 0 20px rgba(0, 255, 204, 0.1); pointer-events: none; }

        .playlist-area { width: 90%; max-width: 400px; height: 60px; background: #080808; border-radius: 8px; border: 1px solid #222; margin: 10px 0; overflow-y: auto; scrollbar-width: none; }
        .queue-item { font-size: 9px; color: #666; padding: 6px; border-bottom: 1px solid #1a1a1a; text-transform: uppercase; }
        .active-track { color: var(--neon); font-weight: bold; background: rgba(0, 255, 204, 0.05); }

        /* Control Console */
        .control-panel { background: #0d0d0d; padding: 10px 15px 20px 15px; border-top: 1px solid #222; flex-shrink: 0; }
        #status-text { font-size: 10px; letter-spacing: 2px; color: var(--neon); margin-bottom: 10px; text-align: center; text-transform: uppercase; height: 14px; }

        .console-row { display: grid; grid-template-columns: 1fr 1.2fr 1fr; gap: 10px; align-items: end; margin-bottom: 12px; }
        .slider-bundle { display: flex; flex-direction: column; align-items: center; gap: 6px; }
        .slider-label { font-size: 8px; font-weight: bold; color: var(--neon); text-transform: uppercase; letter-spacing: 1px; }

        input[type=range].vertical { -webkit-appearance: slider-vertical; width: 14px; height: 90px; accent-color: var(--neon); }
        input[type=range].horizontal { width: 100%; accent-color: var(--neon); height: 20px; }

        #btn-bypass { width: 100%; height: 45px; font-size: 9px; cursor: pointer; border-radius: 6px; border: 1.5px solid var(--neon); background: transparent; color: var(--neon); }
        #btn-bypass.active { background: var(--neon); color: #000; box-shadow: 0 0 10px var(--neon); }

        .transport-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-bottom: 10px; }
        .action-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }

        button, .file-label { background: transparent; color: var(--neon); border: 1.5px solid var(--neon); padding: 12px 2px; cursor: pointer; font-weight: bold; border-radius: 6px; font-size: 9px; text-transform: uppercase; display: flex; justify-content: center; align-items: center; text-decoration: none; }
        button:active, .file-label:active { opacity: 0.6; transform: scale(0.95); }
        button.toggle-on { background: var(--neon); color: #000; }
        
        .recording { background: #ff0033 !important; color: #fff !important; border: none; animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body onclick="unlockAudio()" ontouchstart="unlockAudio()">

    <div class="app-container">
        <div class="top-header"><h1>DEPTH<span>IMPACT</span> HYBRID</h1></div>
        
        <div class="main-interface">
            <div class="globe-wrapper">
                <div class="globe-ring"></div>
                <canvas id="visualizerCanvas" width="220" height="220"></canvas>
            </div>
            
            <div class="playlist-area" id="playlist-container">
                <div class="queue-item">SELECT 'LOAD' FOR MULTI-TRACK</div>
            </div>
        </div>

        <div class="control-panel">
            <div id="status-text">TAP TO WAKE ENGINE</div>
            <div class="console-row">
                <div class="slider-bundle"><span class="slider-label">CLARITY</span><input type="range" class="vertical" id="clarity" min="0" max="100" value="0"></div>
                <div class="slider-bundle"><button id="btn-bypass" class="active">PROCESS ON</button><span class="slider-label">BYPASS</span></div>
                <div class="slider-bundle"><span class="slider-label">DEPTH</span><input type="range" class="vertical" id="depth" min="0" max="100" value="0"></div>
            </div>
            <div class="slider-bundle" style="margin-bottom: 15px; width: 100%;"><span class="slider-label">LO CONTOUR</span><input type="range" class="horizontal" id="contour" min="0" max="100" value="0"></div>

            <div class="transport-grid">
                <button id="btn-rw">« RW</button><button id="btn-play">PLAY</button><button id="btn-stop">STOP</button><button id="btn-ff">FF »</button>
            </div>
            <div class="action-grid">
                <label for="audio-upload" class="file-label">LOAD</label>
                <input type="file" id="audio-upload" accept="audio/*, .mp3, .wav, .m4a, .aiff" multiple style="display:none">
                <button id="btn-shuffle">SHFL</button>
                <button id="btn-repeat">RPT</button>
                <button id="btn-rec">REC</button>
            </div>
        </div>
    </div>

    <script>
        let audioCtx, analyser, sourceNode, loFilter, hiFilter, delayNode, delayGain;
        let isProcessing = true, isRecording = false, recordedChunks = [], mediaRecorder;
        let playlist = [], currentIndex = 0, isShuffle = false, isRepeat = false;
        
        // iOS FIX: Forcing inline playback to prevent Apple from hijacking the media
        const audioEl = new Audio();
        audioEl.playsInline = true;
        audioEl.preload = "auto";

        const canvas = document.getElementById('visualizerCanvas'), canvasCtx = canvas.getContext('2d');
        const bypassBtn = document.getElementById('btn-bypass'), statusText = document.getElementById('status-text');
        const playlistContainer = document.getElementById('playlist-container');

        // FORCE UNLOCK for Mobile Browsers
        function unlockAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioCtx.createAnalyser(); analyser.fftSize = 256;
                sourceNode = audioCtx.createMediaElementSource(audioEl);
                loFilter = audioCtx.createBiquadFilter(); loFilter.type = "lowshelf"; loFilter.frequency.value = 150; loFilter.gain.value = 0;
                hiFilter = audioCtx.createBiquadFilter(); hiFilter.type = "highshelf"; hiFilter.frequency.value = 3000; hiFilter.gain.value = 0;
                delayNode = audioCtx.createDelay(); delayNode.delayTime.value = 0.05;
                delayGain = audioCtx.createGain(); delayGain.gain.value = 0;
                const dest = audioCtx.createMediaStreamDestination();
                mediaRecorder = new MediaRecorder(dest.stream);
                mediaRecorder.ondataavailable = e => recordedChunks.push(e.data);
                mediaRecorder.onstop = saveRecording;
                sourceNode.connect(loFilter); loFilter.connect(hiFilter); hiFilter.connect(analyser); 
                hiFilter.connect(delayNode); delayNode.connect(delayGain); delayGain.connect(analyser);
                analyser.connect(audioCtx.destination); analyser.connect(dest);
                initGlobe(); draw(); routeAudio();
            }
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        // Keep Play button text synced with audio state
        audioEl.addEventListener('play', () => { document.getElementById('btn-play').textContent = "PAUSE"; });
        audioEl.addEventListener('pause', () => { document.getElementById('btn-play').textContent = "PLAY"; });

        document.getElementById('audio-upload').onchange = e => { 
            const files = Array.from(e.target.files);
            playlist = files.filter(f => f.size < 110 * 1024 * 1024); // Memory Guard
            if(playlist.length > 0) { currentIndex = 0; loadTrack(0); }
        };

        function loadTrack(index) {
            if (playlist.length > 0) {
                audioEl.src = URL.createObjectURL(playlist[index]);
                // iOS BUG FIX: Force iOS to buffer the file before trying to process it through DSP
                audioEl.load(); 
                statusText.textContent = "READY: " + playlist[index].name.substring(0, 15).toUpperCase();
                updatePlaylistUI();
            }
        }

        function updatePlaylistUI() {
            playlistContainer.innerHTML = "";
            playlist.forEach((track, i) => {
                const item = document.createElement('div');
                item.className = "queue-item" + (i === currentIndex ? " active-track" : "");
                item.textContent = (i + 1) + ". " + track.name.toUpperCase();
                item.onclick = () => { currentIndex = i; loadTrack(i); audioEl.play(); };
                playlistContainer.appendChild(item);
            });
        }

        audioEl.onended = () => { if (isRepeat) { audioEl.play(); } else { skipTrack(1); } };

        function skipTrack(dir) {
            if (playlist.length === 0) return;
            if (isShuffle) { currentIndex = Math.floor(Math.random() * playlist.length); } 
            else { currentIndex = (currentIndex + dir + playlist.length) % playlist.length; }
            loadTrack(currentIndex); audioEl.play();
        }

        document.getElementById('btn-shuffle').onclick = function() { isShuffle = !isShuffle; this.classList.toggle('toggle-on', isShuffle); };
        document.getElementById('btn-repeat').onclick = function() { isRepeat = !isRepeat; this.classList.toggle('toggle-on', isRepeat); };
        
        // Play/Pause Toggle Logic
        document.getElementById('btn-play').onclick = () => { 
            unlockAudio(); 
            if(audioEl.src) {
                if(audioEl.paused) {
                    audioEl.play().catch(e => {
                        alert("iOS Playback Blocked. Try tapping the screen again, then hit play.");
                    });
                } else {
                    audioEl.pause();
                }
            }
        };
        
        document.getElementById('btn-stop').onclick = () => { audioEl.pause(); audioEl.currentTime = 0; };
        document.getElementById('btn-rw').onclick = () => { if(audioEl.currentTime < 3) skipTrack(-1); else audioEl.currentTime -= 5; };
        document.getElementById('btn-ff').onclick = () => { if(audioEl.duration - audioEl.currentTime < 5) skipTrack(1); else audioEl.currentTime += 5; };
        
        bypassBtn.onclick = () => { isProcessing = !isProcessing; bypassBtn.textContent = isProcessing ? "PROCESS ON" : "BYPASS OFF"; routeAudio(); };

        function routeAudio() {
            if (!audioCtx) return;
            sourceNode.disconnect();
            if (isProcessing) { sourceNode.connect(loFilter); bypassBtn.className = "active"; }
            else { sourceNode.connect(analyser); bypassBtn.className = ""; }
        }

        document.getElementById('clarity').oninput = e => { if(hiFilter) hiFilter.gain.value = (e.target.value / 100) * 25; };
        document.getElementById('depth').oninput = e => { if(delayGain) delayGain.gain.value = e.target.value / 100; };
        document.getElementById('contour').oninput = e => { if(loFilter) loFilter.gain.value = (e.target.value / 100) * 25; };

        document.getElementById('btn-rec').onclick = function() {
            if (!isRecording) { recordedChunks = []; mediaRecorder.start(); isRecording = true; this.classList.add('recording'); }
            else { mediaRecorder.stop(); isRecording = false; this.classList.remove('recording'); }
        };

        function saveRecording() {
            const blob = new Blob(recordedChunks, { type: 'audio/mpeg' });
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'Impact_Mix.mp3'; a.click();
        }

        // --- ORIGINAL STRUCTURED GLOBE ENGINE ---
        let points = [], bgStars = [];
        const globeRadius = 100;

        function initGlobe() {
            for(let i=0; i<60; i++) {
                bgStars.push({ x: Math.random()*220, y: Math.random()*220, sz: 0.3, op: Math.random()*0.2, spd: Math.random()*0.02 });
            }
            // Structured Lattice
            for (let i = 0; i < 10; i++) {
                let lat = Math.acos(-1 + (2 * i) / 10);
                for (let j = 0; j < 12; j++) {
                    let lon = 2 * Math.PI * j / 12;
                    let x = Math.cos(lon) * Math.sin(lat), y = Math.cos(lat), z = Math.sin(lon) * Math.sin(lat);
                    let type = 'mid', fIdx = 10 + Math.floor(Math.random()*20);
                    if(y > 0.4) { type = 'high'; fIdx = 40 + Math.floor(Math.random()*40); }
                    if(y < -0.4) { type = 'low'; fIdx = Math.floor(Math.random()*10); }
                    points.push({ x, y, z, type, fIdx });
                }
            }
        }

        function draw() {
            requestAnimationFrame(draw);
            const data = new Uint8Array(analyser ? analyser.frequencyBinCount : 128);
            if(analyser) analyser.getByteFrequencyData(data);
            canvasCtx.fillStyle = 'rgba(10, 10, 10, 0.4)'; canvasCtx.fillRect(0, 0, 220, 220);

            bgStars.forEach(s => {
                canvasCtx.beginPath(); canvasCtx.arc(s.x, s.y, s.sz, 0, 7);
                canvasCtx.fillStyle = `rgba(0, 255, 204, ${s.op})`; canvasCtx.fill();
                s.y += s.spd; if(s.y > 220) s.y = 0;
            });

            const rotY = Date.now() * 0.0004;
            points.forEach(p => {
                let x = p.x * Math.cos(rotY) - p.z * Math.sin(rotY);
                let z = p.x * Math.sin(rotY) + p.z * Math.cos(rotY);
                let vol = data[p.fIdx] / 255;
                let scale = globeRadius * (0.85 + vol * 0.25);
                
                canvasCtx.beginPath(); canvasCtx.arc(110 + x * scale, 110 + p.y * scale, 1 + vol * 3, 0, 7);
                canvasCtx.fillStyle = p.type === 'low' ? '#fff' : (p.type === 'mid' ? '#00ffcc' : '#007a62');
                canvasCtx.fill();
            });
        }
        initGlobe(); draw();
    </script>
</body>
</html>
